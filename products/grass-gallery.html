<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض النجيل الصناعي | HABIB STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--black); overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Amiri', serif; font-size: 32px; color: var(--black); text-decoration: none; }

        .hero { 
            height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: #fff; margin-top: 60px;
        }
        .hero h1 { font-family: 'Amiri', serif; font-size: 45px; color: var(--black); }

        .container { max-width: 1400px; margin: auto; padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .product-card { 
            background: #fff; position: relative; transition: 0.6s;
            overflow: hidden; border-bottom: 1px solid #eee;
        }
        .img-container { width: 100%; height: 350px; overflow: hidden; background: #f9f9f9; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 20px 0; text-align: right; }
        .btn-luxury { 
            display: block; width: 100%; background: var(--black); color: #fff; 
            text-align: center; text-decoration: none; padding: 12px; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">HABIB STORE</a>
</header>

<section class="hero" data-aos="fade-up">
    <h1>قسم النجيل الصناعي</h1>
    <p style="color: var(--gold); letter-spacing: 2px;">PREMIUM GRASS SELECTION</p>
</section>

<div class="container">
    <div class="grid" id="grass-grid">
        </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>AOS.init({ duration: 1000, once: true });</script>

</body>
</html>
