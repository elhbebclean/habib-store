<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الرخام والأحجار | حبيب ستور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; overflow-x: hidden; }
        .gallery-header { text-align: center; padding: 40px 20px; background: #fff; margin-bottom: 20px; }
        .gallery-header h1 { color: #333; margin: 0; font-size: 2.2rem; }

        /* سكرول المعرض العرضي - اللمسة الاحترافية */
        .marble-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding: 20px 30px 40px 30px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;
        }
        .marble-scroll-container::-webkit-scrollbar { display: none; }

        .stone-card {
            min-width: 300px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-decoration: none;
            color: inherit;
            scroll-snap-align: center;
            transition: transform 0.3s ease;
        }
        .stone-card:hover { transform: translateY(-10px); }
        .stone-card img { width: 100%; height: 250px; object-fit: cover; }
        .stone-name { padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .stone-name h3 { margin: 0; font-size: 1.2rem; color: #1a1a1a; font-weight: 500; }
        
        .hint-text { text-align: center; color: #888; font-size: 0.9rem; margin-top: -10px; }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1>مجموعة الرخام والأحجار الفاخرة</h1>
    </div>
    
    <p class="hint-text"><i class="fas fa-arrows-left-right"></i> اسحب لرؤية المزيد من الأنواع</p>

    <div class="marble-scroll-container" id="marbleGallery">
        </div>

    <script>
        const marbleData = {
            'stone-marble-white': { title: 'White Marble Stone', img: 'stone-marble-white.jpg' },
            'stone-marble-mix': { title: 'Mix Marble Stone', img: 'stone-marble-mix.jpg' },
            'stone-royal': { title: 'Habib Royal Stone', img: 'stone-royal.jpg' },
            'stone-mica-v1': { title: 'Mica Stone V1', img: 'stone-mica-v1.jpg' },
            'stone-mica-v2': { title: 'Mica Stone V2', img: 'stone-mica-v2.jpg' },
            'stone-sand-yellow': { title: 'Yellow Sand Stone', img: 'stone-sand-yellow.jpg' },
            'stone-sand-red': { title: 'Red Sand Stone', img: 'stone-sand-red.jpg' },
            'stone-facade-v1': { title: 'Modern Facade Stone', img: 'stone-facade-v1.jpg' },
            'stone-facade-v2': { title: 'Modern Facade Stone V2', img: 'stone-facade-v2.jpg' },
            'stone-interior-v1': { title: 'Interior Decor Stone', img: 'stone-interior-v1.jpg' },
            'stone-landscape-v1': { title: 'Luxury Stone Landscape', img: 'stone-landscape-v1.jpg' }
        };

        const gallery = document.getElementById('marbleGallery');
        Object.keys(marbleData).forEach(key => {
            gallery.innerHTML += `
                <a href="marble.html?id=${key}" class="stone-card">
                    <img src="../assets/images/marble/${marbleData[key].img}" onerror="this.src='../assets/images/nageel-details/Habib-Istanbul-Lush-40mm.jpg'">
                    <div class="stone-name">
                        <h3>${marbleData[key].title}</h3>
                    </div>
                </a>`;
        });
    </script>
</body>
</html>
