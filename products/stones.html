<script>
    // مصفوفة البيانات بأسماء تقنية مرتبطة بـ IDs محددة وصياغة فاخرة
    const marbleData = {
        "41": { 
            name: "Habib Crystal White", 
            img: "marble-crystal-white.jpg", 
            specs: "نقاء الكريستال الطبيعي", 
            desc: "ندرة الطبيعة تتجسد في صفاء الكريستال الأبيض، ليمنح مساحاتكم إشراقة سرمدية واتساعاً بصرياً يفيض بالهدوء والرفاهية التي تليق بقصوركم." 
        },
        "42": { 
            name: "Habib Emperador Dark", 
            img: "marble-emperador.jpg", 
            specs: "رخام إمبردور ملكي", 
            desc: "لمسة إمبراطورية كلاسيكية بعروق ذهبية دافئة، صُمم ليضفي هيبة الحضور وعمق الفخامة على أرقى التصاميم المعمارية الخاصة." 
        },
        "51": { 
            name: "Habib Stone Mica Grey", 
            img: "stone-mica-grey.jpg", 
            specs: "حجر مايكا رمادي فاخر", 
            desc: "عراقة الملمس الحجري في قالب عصري، يمنح الواجهات صموداً جمالياً وتفاصيل هندسية تعكس قوة التصميم ورقي اختياركم." 
        },
        "52": { 
            name: "Habib Stone Mica Red", 
            img: "stone-mica-red.jpg", 
            specs: "حجر مايكا أحمر دافئ", 
            desc: "دفء الطبيعة وتناغم الألوان الترابية النادرة، لمسة فنية دافئة تمنح حدائقكم الخاصة طابعاً حميمياً وفخامة لا تنضب بمرور الزمن." 
        }
    };

    // المنتجات التكميلية (نفس الـ IDs والأسماء من كودك مع تحسين المسمى)
    const complements = [
        { id: "1", name: "Anatolian Nature (50mm)", img: "Habib-Anatolian-Nature-50mm.jpg", folder: "nageel-details", page: "product-nageel.html" },
        { id: "21", name: "Habib Royal White Zalat", img: "white-zalat.jpg", folder: "zalat", page: "product-zalat.html" }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = marbleData[productId];

    if (product) {
        // تحديث العناصر في الصفحة بنفس الـ IDs الموجودة في هيكلك
        document.getElementById('p-name').innerText = product.name;
        document.getElementById('p-img').src = "../assets/images/marble/" + product.img;
        document.getElementById('p-specs').innerText = product.specs;
        document.getElementById('p-desc').innerText = product.desc;
        document.getElementById('p-whatsapp').href = "https://wa.me/201016961497?text=استفسار بخصوص مقتنيات " + product.name;

        let sliderHTML = '';
        complements.forEach(item => {
            sliderHTML += `
                <a href="${item.page}?id=${item.id}" class="insta-card">
                    <img src="../assets/images/${item.folder}/${item.img}" alt="${item.name}">
                    <div class="insta-card-info">
                        <h4>${item.name}</h4>
                    </div>
                </a>`;
        });
        document.getElementById('complementary-slider').innerHTML = sliderHTML;
    }
</script>
