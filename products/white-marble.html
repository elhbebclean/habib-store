<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الزلط - حبيب ستور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; }
        .main-container { max-width: 800px; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        #productImage { width: 100%; max-height: 450px; object-fit: cover; border-radius: 10px; }
        .btn-whatsapp { display: inline-block; background: #25d366; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 20px 0; }
        
        /* شريط المنتجات ذات الصلة - سكرول عرضي */
        .scroll-wrapper { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 20px; 
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .related-card { 
            min-width: 200px; 
            background: white; 
            border-radius: 10px; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: inherit; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .related-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="main-container">
        <img id="productImage" src="" alt="Habib Zalat">
        <h1 id="productTitle">تحميل...</h1>
        <a href="https://wa.me/201016961497" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> اطلب عبر الواتساب</a>
    </div>

    <h3 style="text-align: center; margin-top: 40px;">أنواع زلط أخرى</h3>
    <div class="scroll-wrapper" id="relatedZalat"></div>

    <script>
        const zalatItems = {
            'zalat-asyuti': { title: 'Zalat Asyuti V2', img: 'zalat-asyuti-v2.jpeg' },
            'zalat-black-royal': { title: 'Zalat Black Royal', img: 'zalat-black-royal.jpg' },
            'zalat-black-volcanic': { title: 'Zalat Black Volcanic', img: 'zalat-black-volcanic.jpeg' },
            'zalat-white-v1': { title: 'White Marble V1', img: 'zalat-white-marble-v1.jpeg' },
            'zalat-white-v2': { title: 'White Marble V2', img: 'zalat-white-marble-v2.jpeg' },
            'zalat-light-gray': { title: 'Zalat Light Gray', img: 'zalat-light-gray.jpg' },
            'zalat-mix-v1': { title: 'Zalat Mix Colors V1', img: 'zalat-mix-colors.jpeg' },
            'zalat-mix-v2': { title: 'Zalat Mix Colors V2', img: 'zalat-mix-colors_.jpg' },
            'zalat-red-volcanic': { title: 'Red Volcanic Stone', img: 'zalat-red-volcanic.jpeg' },
            'white-zalat': { title: 'Pure White Zalat', img: 'white-zalat.jpg' },
            'zalat-luxury': { title: 'Luxury Garden Ideas', img: 'zalat-garden-ideas-luxury.jpg' }
        };

        const id = new URLSearchParams(window.location.search).get('id');
        const product = zalatItems[id];

        if (product) {
            document.getElementById('productTitle').innerText = product.title;
            // المسار المعتمد من جيتها بتاعك
            document.getElementById('productImage').src = '../assets/images/zalat/' + product.img;
        }

        const relDiv = document.getElementById('relatedZalat');
        Object.keys(zalatItems).forEach(key => {
            if (key !== id) {
                relDiv.innerHTML += `
                    <a href="white-marble.html?id=${key}" class="related-card">
                        <img src="../assets/images/zalat/${zalatItems[key].img}">
                        <h4 style="font-size:0.9rem;">${zalatItems[key].title}</h4>
                    </a>`;
            }
        });
    </script>
</body>
</html>
