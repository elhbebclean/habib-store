<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الزلط - حبيب ستور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .main-container { max-width: 800px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .product-image { width: 100%; max-height: 450px; object-fit: cover; border-radius: 10px; }
        .product-title { font-size: 2.2rem; color: #333; margin: 20px 0; }
        .btn-whatsapp { display: inline-block; background: #25d366; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; }
        
        /* ستايل المنتجات ذات الصلة الأصلي */
        .related-products { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .related-products::-webkit-scrollbar { display: none; }
        .product-card { min-width: 200px; background: white; border-radius: 10px; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="main-container">
        <img id="productImage" class="product-image" src="" alt="زلط حبيب ستور">
        <h1 id="productTitle" class="product-title">تحميل...</h1>
        <a href="https://wa.me/201016961497" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> تواصل لطلب المنتج
        </a>
    </div>

    <h3 style="text-align: center; margin-top: 40px;">منتجات ذات صلة</h3>
    <div class="related-products" id="relatedZalat">
        </div>
    <script>
        // مصفوفة الزلط الرسمية المربوطة بفولدر assets/images/zalat/
        const zalatItems = {
            'zalat-asyuti': { title: 'Zalat Asyuti V2', img: 'zalat-asyuti-v2.jpeg' },
            'zalat-black-royal': { title: 'Zalat Black Royal', img: 'zalat-black-royal.jpg' },
            'zalat-black-volcanic': { title: 'Zalat Black Volcanic', img: 'zalat-black-volcanic.jpeg' },
            'zalat-white-v1': { title: 'White Marble V1', img: 'zalat-white-marble-v1.jpeg' },
            'zalat-white-v2': { title: 'White Marble V2', img: 'zalat-white-marble-v2.jpeg' },
            'zalat-light-gray': { title: 'Zalat Light Gray', img: 'zalat-light-gray.jpg' },
            'zalat-mix-v1': { title: 'Zalat Mix Colors V1', img: 'zalat-mix-colors.jpeg' },
            'zalat-mix-v2': { title: 'Zalat Mix Colors V2', img: 'zalat-mix-colors_.jpg' },
            'zalat-red-volcanic': { title: 'Red Volcanic Stone', img: 'zalat-red-volcanic.jpeg' },
            'white-zalat': { title: 'Pure White Zalat', img: 'white-zalat.jpg' },
            'zalat-luxury': { title: 'Luxury Garden Ideas', img: 'zalat-garden-ideas-luxury.jpg' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const current = zalatItems[productId];

        if (current) {
            document.getElementById('productTitle').innerText = current.title;
            // الخروج من products والدخول لـ assets
            document.getElementById('productImage').src = '../assets/images/zalat/' + current.img;
        }

        // بناء "منتجات ذات صلة" بسكرول عرضي
        const relDiv = document.getElementById('relatedZalat');
        Object.keys(zalatItems).forEach(key => {
            if (key !== productId) {
                relDiv.innerHTML += `
                    <a href="white-marble.html?id=${key}" style="text-decoration:none; color:inherit;">
                        <div class="product-card">
                            <img src="../assets/images/zalat/${zalatItems[key].img}" style="width:100%; height:120px; object-fit:cover; border-radius:5px;">
                            <h4 style="font-size:0.9rem; margin:10px 0;">${zalatItems[key].title}</h4>
                        </div>
                    </a>`;
            }
        });
    </script>
</body>
</html>
