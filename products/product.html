<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">تفاصيل المنتج | حبيب ستور</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --green: #1a5d1a; --gold: #AF944F; --black: #111; --white: #ffffff; --bg: #f4f7f4; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        .product-container { max-width: 1000px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header-area { text-align: center; margin-bottom: 30px; }
        .p-name { font-family: 'Amiri', serif; font-size: 35px; color: var(--green); margin: 0; }
        .p-brand { color: var(--gold); font-size: 14px; font-weight: 700; display: block; margin-top: 5px; }

        .main-img-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 30px; border: 1px solid #eee; background: #fff; }
        .main-img { width: 100%; display: block; object-fit: contain; max-height: 600px; }

        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .spec-card { background: #f9fdf9; padding: 15px; border-radius: 8px; border-right: 4px solid var(--gold); }
        .spec-label { font-size: 12px; color: #777; display: block; }
        .spec-value { font-size: 18px; font-weight: 700; color: var(--black); }

        .desc-box { padding: 25px; background: #fffdf7; border: 1px solid #f1e8d5; border-radius: 10px; margin-bottom: 30px; }
        .desc-text { font-family: 'Amiri', serif; font-size: 20px; line-height: 1.8; color: #444; margin: 0; }

        .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 20px; background: #25D366; color: white; text-decoration: none; border-radius: 10px; font-size: 20px; font-weight: 700; transition: 0.3s; }
        .whatsapp-btn:hover { background: #128C7E; transform: translateY(-3px); }
    </style>
</head>
<body>

<div id="view-content" class="product-container">
    <div class="header-area">
        <h1 id="p-name" class="p-name">جاري التحميل...</h1>
        <span class="p-brand">HABIB STORE | PREMIUM TURKISH QUALITY</span>
    </div>

    <div class="main-img-wrapper">
        <img id="p-img" src="" alt="صورة المنتج" class="main-img">
    </div>

    <div class="specs-grid">
        <div class="spec-card">
            <span class="spec-label">المقاس والكثافة:</span>
            <span id="p-specs" class="spec-value">--</span>
        </div>
        <div class="spec-card">
            <span class="spec-label">المنشأ والجودة:</span>
            <span class="spec-value">تركي - نخب أول</span>
        </div>
    </div>

    <div class="desc-box">
        <p id="p-desc" class="desc-text"></p>
    </div>

    <a id="p-whatsapp" href="#" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> اطلب السعر والمعاينة الآن
    </a>
</div><div style="margin-top: 50px; border-top: 2px solid #eee; padding-top: 30px;">
        <h2 style="font-family: 'Amiri', serif; font-size: 24px; color: var(--green); margin-bottom: 20px;">منتجات قد تعجبك أيضاً:</h2>
        <div id="related-products" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            </div>
    </div>
</div> <script>
    // قاعدة بيانات المنتجات والربط مع أسماء الصور التركية في الفولدر الجديد
    const products = {
        "1": { name: "نجيل سوبر رويال 50 ملم", img: "Habib-Anatolian-Nature-50mm.jpg", specs: "50 ملم - كثافة القصور", desc: "أجود أنواع النجيل التركي بارتفاع 50 ملم، مصمم للفلل والقصور ليعطي ملمساً طبيعياً فائقاً وقدرة تحمل عالية." },
        "2": { name: "نجيل أسطوري 40 ملم (28 غرزة)", img: "Habib-Legendary-Silk-40mm-28.jpg", specs: "40 ملم - 28 غرزة فائقة", desc: "الخيار الأقوى للمساحات التي تتعرض لاستخدام كثيف، يتميز بـ 28 غرزة لضمان استقامة الشعيرات أطول فترة ممكنة." },
        "3": { name: "نجيل ملكي 40 ملم (24 غرزة)", img: "Habib-Bosphorus-Green-40mm-24.jpg", specs: "40 ملم - 24 غرزة كثيفة", desc: "توازن مثالي بين السعر والجودة الفاخرة، مثالي للحدائق المنزلية التي تبحث عن مظهر فندقي مرتب." },
        "4": { name: "نجيل فندقي 40 ملم (طبيعي)", img: "Habib-Istanbul-Lush-40mm.jpg", specs: "40 ملم - المظهر الطبيعي", desc: "يتميز بلونه الأخضر الزاهي وتوزيعه المريح للعين، يعطي انطباع النجيل الطبيعي المقصوص بعناية." },
        "5": { name: "نجيل 40 ملم - الفئة العملية", img: "Habib-Marmara-Turf-40mm-12.jpg", specs: "40 ملم - 12 غرزة اقتصادية", desc: "حل عملي للمساحات الواسعة والمشاريع الكبيرة، يوفر شكلاً جمالياً بأسعار تنافسية جداً." },
        "6": { name: "نجيل إليت 30 ملم (24 غرزة)", img: "Habib-Antalya-Breeze-30mm-24.jpg", specs: "30 ملم - 24 غرزة بريميوم", desc: "نعومة فائقة وكثافة غرز عالية تجعل الجلوس عليه مريحاً جداً، اختيار ممتاز للروف وبلكونات الشقق." },
        "9": { name: "نجيل 20 ملم ستاندرد", img: "Habib-Standard-Turkish-20mm-12.jpg", specs: "20 ملم - 12 غرزة", desc: "المنتج الأكثر طلباً للمداخل والممرات، سهل التنظيف وشديد التحمل لعوامل الجو المختلفة." },
        "10": { name: "نجيل 11 ملم (العملي)", img: "Habib-Practical-Green-11mm.jpg", specs: "11 ملم - مسطحات", desc: "تصميم مخصص للمساحات التي تحتاج لفرش فلات وسهل الحركة، مثالي للمحلات والمعارض الجمالية." },
        "11": { name: "نجيل ألترا سليم 6 ملم", img: "Habib-Ultra-Slim-6mm..jpg", specs: "6 ملم - فئة اقتصادية", desc: "أقل ارتفاع متاح، سهل التركيب جداً ويستخدم كبديل للسجاد في الأماكن الخارجية ليعطي لمسة خضراء بسيطة." }
    };

    // كود تشغيل الصفحة
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = products[productId];

    if (product) {
        document.getElementById('p-name').innerText = product.name;
        document.getElementById('page-title').innerText = product.name + " | حبيب ستور";
        document.getElementById('p-img').src = "../assets/images/nageel-details/" + product.img;
        document.getElementById('p-specs').innerText = product.specs;
        document.getElementById('p-desc').innerText = product.desc;
        document.getElementById('p-whatsapp').href = "https://wa.me/201016961497?text=استفسار عن " + product.name;

        // توليد منتجات ذات صلة (3 منتجات عشوائية غير الحالي)
        let relatedHTML = '';
        Object.keys(products).filter(id => id !== productId).slice(0, 4).forEach(id => {
            let p = products[id];
            relatedHTML += `
                <a href="product.html?id=${id}" style="text-decoration:none; color:inherit;">
                    <div style="background:#fff; border:1px solid #eee; border-radius:8px; overflow:hidden; text-align:center;">
                        <img src="../assets/images/nageel-details/${p.img}" style="width:100%; height:120px; object-fit:cover;">
                        <h4 style="font-size:12px; padding:10px; margin:0;">${p.name}</h4>
                    </div>
                </a>`;
        });
        document.getElementById('related-products').innerHTML = relatedHTML;
    } else {
        document.getElementById('view-content').innerHTML = "<h2>المنتج غير موجود</h2><a href='gallery.html'>العودة للمعرض</a>";
    }
</script>
</body>
</html>
