<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Habib Stone | Elite Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --text-dark: #333; --bg-light: #fdfdfd; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-light); color: var(--text-dark); margin: 0; padding: 0; overflow-x: hidden; }
        
        .container { max-width: 900px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-top: 6px solid var(--main-green); }
        .product-header { text-align: center; margin-bottom: 30px; }
        .product-name { font-family: 'Amiri', serif; font-size: 36px; color: var(--main-green); margin-bottom: 5px; font-weight: 700; }
        .product-sub { color: #888; font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .product-image { width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; }
        
        .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #fafafa; border-radius: 12px; overflow: hidden; }
        .spec-table td { padding: 18px 25px; border-bottom: 1px solid #eee; font-size: 19px; }
        .spec-label { font-weight: bold; color: var(--main-green); width: 35%; background: #f0f4f0; }

        .description { line-height: 2.2; font-size: 22px; color: #444; margin-bottom: 40px; text-align: justify; padding: 0 20px; border-right: 5px solid var(--main-green); font-family: 'Amiri', serif; }
        
        .whatsapp-btn { display: block; text-align: center; background: #25D366; color: white; padding: 22px; text-decoration: none; border-radius: 50px; font-size: 22px; font-weight: bold; transition: 0.4s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .whatsapp-btn:hover { background: #128C7E; transform: translateY(-3px); }
        
        .back-link { display: block; text-align: center; margin-top: 30px; color: var(--main-green); text-decoration: none; font-weight: bold; font-size: 16px; margin-bottom: 40px; }

        /* --- شريط المنتجات المقترحة (The Shark Slider) --- */
        .luxury-suggestions { margin-top: 60px; padding: 40px 0; border-top: 2px solid #f0f0f0; }
        .luxury-suggestions h3 { font-family: 'Amiri', serif; text-align: center; color: var(--main-green); margin-bottom: 25px; font-size: 26px; }
        
        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            gap: 20px; 
            padding: 10px 5%; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .slider-container::-webkit-scrollbar { display: none; } /* إخفاء الشريط السفلي لشكل أنيق */

        .slider-card { 
            min-width: 220px; 
            background: var(--white); 
            border: 1px solid #eee; 
            border-radius: 15px; 
            overflow: hidden; 
            transition: 0.4s; 
            text-decoration: none; 
            color: inherit;
        }
        .slider-card:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .slider-card img { width: 100%; height: 140px; object-fit: cover; }
        .slider-card .info-box { padding: 15px; text-align: center; }
        .slider-card h4 { font-size: 15px; margin: 0 0 10px; color: #333; }
        .slider-card span { color: var(--gold); font-weight: bold; font-size: 12px; border: 1px solid var(--gold); padding: 3px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" data-aos="fade-up">
    <div class="product-header">
        <h1 id="p-name" class="product-name">جاري التحميل...</h1>
        <p id="p-sub" class="product-sub">Habib Stone Luxury Platform</p>
    </div>

    <img id="p-img" src="" alt="Habib Luxury" class="product-image">

    <table class="spec-table">
        <tr><td class="spec-label">المنشأ:</td><td id="p-origin">--</td></tr>
        <tr><td class="spec-label">المواصفة:</td><td id="p-size">--</td></tr>
        <tr><td class="spec-label">الفئة:</td><td id="p-density">--</td></tr>
        <tr><td class="spec-label">الضمان:</td><td>Habib Signature 🛡️</td></tr>
    </table>

    <div id="p-desc" class="description"></div>

    <a id="p-whatsapp" href="#" class="whatsapp-btn">حجز معاينة | اطلب السعر الآن</a>
    <a href="grass-gallery.html" class="back-link">← العودة للمعرض الرئيسي</a>

    <div id="suggestions-area"></div>
</div><script>
    // 🦈 الدفتر الموحد لبلاتفورم حبيب ستون (هنا بتضيف أي منتج جديد)
    const products = {
        // --- قسم النجيل (Category: nageel) ---
        1: { cat: "nageel", name: "Habib Royal Izmir Spring", size: "50 ملم", density: "16 غرزة", origin: "تركيا 🇹🇷", img: "nageel/grass-50mm-natural.jpeg", desc: "بساطٌ ملكي صُمم ليتجاوز حدود العشب التقليدي. بارتفاعه الشامخ ونعومته الحريرية، يمنح 'رويال إزمير' قصوركم هيبة الطبيعة الخالدة." },
        2: { cat: "nageel", name: "Habib Istanbul Lush Elite", size: "40 ملم", density: "28 غرزة", origin: "تركيا 🇹🇷", img: "nageel/grass-40mm-natural-28.jpeg", desc: "عندما تلتقي الكثافة الفائقة بالرفاهية المطلقة. يمنحكم 'إسطنبول لَش إيليت' كثافة لا تُضاهى، مما يخلق طبقة من الرفاهية تحت أقدامكم." },
        
        // --- قسم الرخام (Category: marble) ---
        101: { cat: "marble", name: "خردة رخام أبيض ملكي", size: "مقاسات متنوعة", density: "نخب أول", origin: "مصر 🇪🇬", img: "marble/marble-sample.jpg", desc: "لمسة الفخامة المصرية الأصيلة. خردة الرخام الأبيض تمنح ممرات حدائقكم طابعاً أرستقراطياً فريداً." },
        
        // --- قسم الزلط (Category: zalat) ---
        201: { cat: "zalat", name: "زلط ديكور أبيض يوناني", size: "جامبو ناعم", density: "مستورد", origin: "اليونان 🇬🇷", img: "zalat/white-pebbles.jpg", desc: "اللمسة النهائية التي تكتمل بها اللوحة. زلط الديكور الأبيض اليوناني يضيف تبايناً بصرياً مذهلاً." }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id') || 1; 
    const p = products[productId];

    if (p) {
        // 1. تحديث بيانات المنتج الأساسي
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-density').innerText = p.density;
        document.getElementById('p-origin').innerText = p.origin;
        document.getElementById('p-desc').innerText = p.desc;
        document.getElementById('p-img').src = "../assets/images/" + p.img; 
        document.title = p.name + " | Habib Stone Platform";

        // 2. تحديث رابط الواتساب برقمك
        const waMessage = `أهلاً Habib Stone، أود الاستفسار عن تفاصيل: ${p.name}`;
        document.getElementById('p-whatsapp').href = `https://wa.me/201016961497?text=${encodeURIComponent(waMessage)}`;

        // 3. --- محرك الشريط المتحرك (The Smart Slider) ---
        const suggestionsArea = document.getElementById('suggestions-area');
        let sliderHTML = `
            <div class="luxury-suggestions">
                <h3>إضافات تكتمل بها فخامة واحتك</h3>
                <div class="slider-container">
        `;

        // نلف على الدفتر ونطلع المنتجات اللي من أقسام تانية
        for (let id in products) {
            // الشرط: لو المنتج مش من نفس النوع اللي العميل فاتحه (Cross-Selling)
            if (products[id].cat !== p.cat) {
                sliderHTML += `
                    <a href="product.html?id=${id}" class="slider-card">
                        <img src="../assets/images/${products[id].img}" alt="${products[id].name}">
                        <div class="info-box">
                            <h4>${products[id].name}</h4>
                            <span>تفاصيل الفخامة ←</span>
                        </div>
                    </a>
                `;
            }
        }

        sliderHTML += `</div></div>`;
        suggestionsArea.innerHTML = sliderHTML;
    }
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    window.addEventListener('load', function() {
        AOS.init({ duration: 1000, once: true });
    });
</script>

</body>
</html>
