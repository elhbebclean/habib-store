<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Habib Store | اختيار الصفوة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --black: #111; --white: #ffffff; --light-gray: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        
        .container { max-width: 950px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); border-top: 8px solid var(--main-green); position: relative; }
        
        .product-header { text-align: center; margin-bottom: 30px; }
        .product-name { font-family: 'Amiri', serif; font-size: clamp(30px, 6vw, 42px); color: var(--main-green); font-weight: 800; margin: 0; line-height: 1.2; }
        .product-sub { color: #666; font-size: 18px; margin-top: 10px; font-weight: 600; }

        .img-wrapper { position: relative; width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #eee; margin-bottom: 35px; background: #fff; }
        .product-image { width: 100%; max-height: 550px; object-fit: cover; display: block; transition: transform 0.6s ease; }
        .img-wrapper:hover .product-image { transform: scale(1.03); }

        .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 35px; background: var(--light-gray); border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .spec-table td { padding: 18px 25px; border-bottom: 1px solid #eee; font-size: 19px; }
        .spec-label { font-weight: bold; color: var(--main-green); background: #f0f4f0; width: 35%; }

        .description-box { position: relative; padding: 30px; background: #fffdf9; border-radius: 20px; border: 1px dashed var(--gold); margin-bottom: 40px; }
        .description-box i { position: absolute; top: -15px; right: 20px; background: var(--gold); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .description-text { line-height: 2.2; font-size: 21px; color: #444; text-align: justify; font-family: 'Amiri', serif; margin: 0; }

        .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 15px; background: #25D366; color: white; padding: 22px; text-decoration: none; border-radius: 50px; font-size: 24px; font-weight: 800; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); transition: 0.4s; }
        .whatsapp-btn:hover { background: #128C7E; transform: translateY(-5px); }

        .related-section { margin-top: 60px; border-top: 2px solid #eee; padding-top: 40px; }
        .related-title { font-family: 'Amiri', serif; font-size: 28px; color: var(--main-green); margin-bottom: 30px; text-align: right; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .related-card { text-decoration: none; color: inherit; background: white; border: 1px solid #eee; border-radius: 15px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; text-align: center; }
        .related-card:hover { transform: translateY(-7px); border-color: var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .related-card img { width: 100%; height: 150px; object-fit: cover; }
        .related-card-info { padding: 15px; }
        .related-card-info h4 { font-size: 15px; margin: 0 0 10px; color: #333; font-weight: 700; }
        .related-card-info span { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 20px; }

        .cta-gallery-btn { display: inline-block; padding: 18px 45px; background: var(--black); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 18px; transition: 0.3s; margin-top: 40px; }
        .cta-gallery-btn:hover { background: var(--gold); }

        @media (max-width: 600px) { .related-grid { grid-template-columns: 1fr; } .container { padding: 20px; margin: 20px auto; } }
    </style>
</head>
<body>
<div class="container">
    <div class="product-header">
        <h1 id="p-name" class="product-name">جاري تحميل الفخامة...</h1>
        <p id="p-sub">Habib Store - اختيار الصفوة</p>
    </div>
    
    <div class="img-wrapper">
        <img id="p-img" src="" alt="" class="product-image">
    </div>
    
    <table class="spec-table">
        <tr><td class="spec-label">الارتفاع / المقاس:</td><td id="p-size">--</td></tr>
        <tr><td class="spec-label">الكثافة / النوع:</td><td id="p-density">--</td></tr>
        <tr><td class="spec-label">بلد المنشأ:</td><td>تركيا (نخب أول) 🇹🇷</td></tr>
    </table>

    <div class="description-box">
        <i class="fas fa-quote-right"></i>
        <p id="p-desc" class="description-text"></p>
    </div>

    <a id="p-whatsapp" href="#" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> اطلب معاينة وسعر الآن (واتساب)
    </a>

    <div class="related-section">
        <h3 class="related-title"><i class="fas fa-magic"></i> نرشح لك لإكمال أناقة المكان:</h3>
        <div id="related-grid" class="related-grid"></div>
        <div id="gallery-cta-wrapper" style="text-align:center;"></div>
    </div>
</div><script>
    // 🦈 مخزن بضاعة حبيب ستون - نجيل + زلط + رخام + ميكا
    // ملاحظة: الـ ID لازم يطابق الرقم اللي بعتناه في روابط المعارض (1, 101, 301...)
    const products = {
        // --- [1] قسم النجيل التركي (IDs: 1 - 50) ---
        "1": { cat: "nageel", name: "نجيل سوبر رويال - 50 ملم", size: "50 ملم (5 سم)", density: "كثافة القصور", img: "nageel/grass-50mm-natural.jpeg", desc: "هل تبحث عن الفخامة المطلقة؟ نجيل سوبر رويال بارتفاع 5 سم هو الاختيار الأول للفيلات والقصور الراقية. يتميز بملمس طبيعي فائق النعومة يحاكي العشب الطبيعي البكر، مع قدرة مذهلة على تحمل أشعة الشمس المباشرة لسنوات دون تغيير في زهوة ألوانه. بساط ملكي يحول حديقتك لواحة خضراء." },
        "2": { cat: "nageel", name: "نجيل أسطوري 40 ملم (28 غرزة)", size: "40 ملم (4 سم)", density: "28 غرزة (فائقة)", img: "nageel/grass-40mm-natural-28.jpeg", desc: "القوة والجمال في منتج واحد. صُمم خصيصاً للمساحات التي تشهد حركة كثيفة ولعب أطفال، حيث تحافظ الغرز الـ 28 على مظهر النجيل ممتلئاً وحيوياً لسنوات دون أن يهبط، مع الحفاظ على ملمس ناعم وآمن تماماً." },
        "3": { cat: "nageel", name: "نجيل ملكي 40 ملم (24 غرزة)", size: "40 ملم (4 سم)", density: "24 غرزة (كثيفة)", img: "nageel/grass-40mm-natural-24.jpeg", desc: "التوازن المثالي بين الفخامة والسعر. اختيار الصفوة لتنسيق الروف والحدائق المنزلية، يمنحك مظهراً طبيعياً جداً وراحة بصرية لا توصف. نخب أول تركي بضمان حبيب ستون، يتميز بمقاومة العوامل الجوية المتقلبة." },
        "9": { cat: "nageel", name: "نجيل 20 ملم ستاندرد", size: "20 ملم (2 سم)", density: "12 غرزة (عملي)", img: "nageel/grass-20mm-standard-12.jpeg", desc: "الحل الذكي والعملي لتغطية المساحات الواسعة والممرات. بساط منظم بلمسة جمالية تركية، يوفر لك النظافة والأناقة بتكلفة اقتصادية جداً، مثالي للمحلات التجارية والمساحات المفتوحة." },

        // --- [2] قسم الزلط الديكوري (IDs: 101 - 150) ---
        "101": { cat: "zalat", name: "زلط أبيض رخامي فاخر V1", size: "أحجام متنوعة", density: "نخب أول مستورد", img: "zalat/zalat-white-marble-v1.jpeg", desc: "اللمسة الأرستقراطية التي تبرز جمال النجيل الأخضر. زلط أبيض رخامي نقي يعمل كبرواز طبيعي لحديقتك، مما يعطي انطباعاً بالنظافة والاتساع الفوري للمكان، لونه ثابت ولا يتأثر بالماء." },
        "103": { cat: "zalat", name: "زلط أسود بركاني طبيعي", size: "أسود فحم", density: "أصلي بركاني", img: "zalat/zalat-black-volcanic.jpeg", desc: "عشاق التصميمات المودرن يفضلون الزلط البركاني الأسود. لونه الفخم يخلق تبايناً مذهلاً مع النجيل، وهو حجر طبيعي صلب لا يتأثر بالعوامل الجوية، مما يضمن لك جمالاً باقياً لسنوات." },

        // --- [3] قسم الرخام والميكا (IDs: 301 - 350) ---
        "301": { cat: "marble", name: "رخام كرارة ملي براون", size: "فاخر", density: "نخب أول", img: "marble/marble-carrara-milli-brown.jpg", desc: "سحر الرخام الإيطالي الممزوج بلمسات البراون الدافئة. اختيارك الأول لتجعل أركان منزلك تنطق بالفخامة، نسيج طبيعي فريد يزداد جمالاً مع الإضاءة، مثالي للحوائط الديكورية والتابلوهات." },
        "302": { cat: "marble", name: "رخام كريستال وايت ناصع", size: "أبيض كريستال", density: "نخب أول", img: "marble/marble-crystal-white.jpg", desc: "بياض الكريستال الذي يمنح المكان إشراقاً واتساعاً. رخام عالي الجودة يعكس الرقي في كل تفصيلة، مثالي للتابلوهات الحجرية والديكورات الراقية التي تبحث عن الفخامة الهادئة." },
        "303": { cat: "marble", name: "رخام إمبلادور كلاسيك فخم", size: "إسباني المنشأ", density: "نخب أول", img: "marble/marble-emperador.jpg", desc: "ملك الرخام البني. الإمبلادور يضيف لمسة دافئة وتاريخية لأي تصميم، معروف بعروقه الذهبية التي تعطي فخامة فورية للأرضيات والحوائط." },
        "307": { cat: "marble", name: "حجر ميكا رمادي (واجهات)", size: "شرائح طبيعية", density: "طبيعي 100%", img: "marble/stone-mica-grey.jpg", desc: "الخيار العصري لواجهات الفيلات والتشطيبات المودرن. لون رمادي ثابت وشكل حجري فخم يعمل كعازل طبيعي للحرارة ويجمل واجهة منزلك بقوة تحمل جبارة ومظهر لا تنتهي موضته." },
        "308": { cat: "marble", name: "حجر ميكا أحمر حراري", size: "شرائح خاصة", density: "طبيعي حراري", img: "marble/stone-mica-red.jpg", desc: "دفء الطبيعة في حجر الميكا الأحمر. يتميز بمتانته العالية ومقاومته للحرارة، مما يجعله مثالي للديكورات الخارجية الجريئة التي تعبر عن الشخصية القوية للمكان." },
        "309": { cat: "marble", name: "حجر ساند ستون (الرملي)", size: "طبيعي", density: "نخب أول", img: "marble/marble-sandstone.jpg", desc: "الأناقة الكلاسيكية في الحجر الرملي الطبيعي. يمنح المكان ملمساً دافئاً وشكلاً لا تنتهي موضته أبداً، اختيار خبراء اللاندسكيب لإعطاء روح الطبيعة لكل زاوية." }
    };

    // --- 🚀 محرك التشغيل الذكي ---
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id') || "1";
    const p = products[productId];

    if (p) {
        // تحديث البيانات
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-density').innerText = p.density;
        document.getElementById('p-desc').innerText = p.desc;
        
        // حل مشكلة الصورة: المسار يبدأ من الفولدر الأب
        document.getElementById('p-img').src = "../assets/images/" + p.img;
        document.getElementById('p-img').alt = p.name;
        document.title = p.name + " | حبيب ستون";

        // الواتساب
        const waMsg = `أهلاً حبيب ستون، أريد استفسار عن: ${p.name} (كود: ${productId})`;
        document.getElementById('p-whatsapp').href = `https://wa.me/201016961497?text=${encodeURIComponent(waMsg)}`;

        // محرك "الروح" (عشوائية ميكس)
        let others = Object.keys(products).filter(id => products[id].cat !== p.cat);
        others.sort(() => Math.random() - 0.5);

        let relatedHTML = '';
        others.slice(0, 4).forEach(id => {
            relatedHTML += `
                <a href="product.html?id=${id}" class="related-card">
                    <img src="../assets/images/${products[id].img}" onerror="this.src='../assets/images/logo.png'">
                    <div class="related-card-info">
                        <h4>${products[id].name}</h4>
                        <span>استكشف الفخامة ←</span>
                    </div>
                </a>`;
        });
        document.getElementById('related-grid').innerHTML = relatedHTML;

        // زرار "تعالي يا باشا" الديناميكي
        let targetLink = (p.cat === "nageel") ? "zalat-gallery.html" : "nageel-gallery.html";
        let targetText = (p.cat === "nageel") ? "عالم الزلط والرخام" : "تشكيلة النجيل التركي";
        document.getElementById('gallery-cta-wrapper').innerHTML = `
            <a href="${targetLink}" class="cta-gallery-btn">
                تعالى يا باشا خد فكرة في معرض ${targetText} ←
            </a>`;

    } else {
        // لو مفيش منتج
        document.querySelector('.container').innerHTML = `<div style="text-align:center; padding:100px 20px;"><h2>المنتج غير متوفر حالياً</h2><a href="../index.html">العودة للرئيسية</a></div>`;
    }
</script>
</body>
</html>
