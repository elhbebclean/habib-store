<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">حبيب ستور | تفاصيل المنتج التركي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --black: #111; --white: #ffffff; --light-gray: #f8f9fa; }
        
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; margin: 0; padding: 0; color: #333; line-height: 1.6; overflow-x: hidden; }
        
        .container { max-width: 1000px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border-top: 6px solid var(--main-green); }
        
        .product-header { text-align: center; margin-bottom: 35px; }
        .product-name { font-family: 'Amiri', serif; font-size: clamp(28px, 5vw, 40px); color: var(--main-green); font-weight: 800; margin: 0; }
        .product-brand { color: var(--gold); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; display: block; }

        .img-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 35px; background: #eee; border: 1px solid #e0e0e0; }
        .product-image { width: 100%; max-height: 550px; object-fit: cover; display: block; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; }
        .info-item { background: var(--light-gray); padding: 20px; border-radius: 10px; border-right: 4px solid var(--gold); }
        .info-label { font-size: 13px; color: #666; font-weight: 700; display: block; margin-bottom: 5px; }
        .info-value { font-size: 18px; color: var(--black); font-weight: 700; }

        .description-section { margin-bottom: 40px; padding: 25px; background: #fffdf9; border-radius: 12px; border: 1px solid #f1e6cc; }
        .description-text { font-size: 20px; color: #444; text-align: justify; font-family: 'Amiri', serif; line-height: 2.2; margin: 0; }

        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 22px; background: #25D366; color: white; text-decoration: none; border-radius: 10px; font-size: 20px; font-weight: 700; transition: 0.3s; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); }
        .btn-whatsapp:hover { background: #128C7E; transform: translateY(-3px); }

        /* تظبيط السلايدر للمنتجات المكملة */
        .related-section { margin-top: 60px; border-top: 1px solid #eee; padding-top: 40px; }
        .related-title { font-family: 'Amiri', serif; font-size: 28px; color: var(--main-green); margin-bottom: 25px; text-align: right; }
        
        .related-slider { 
            display: flex; overflow-x: auto; gap: 20px; padding: 10px 5px 25px;
            scroll-snap-type: x mandatory; scrollbar-width: thin; 
        }
        .related-slider::-webkit-scrollbar { height: 6px; }
        .related-slider::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .related-card { 
            min-width: 220px; flex: 0 0 auto; scroll-snap-align: start;
            background: white; border: 1px solid #eee; border-radius: 12px; overflow: hidden; transition: 0.3s; text-decoration: none;
        }
        .related-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .related-card img { width: 100%; height: 150px; object-fit: cover; }
        .related-card h4 { font-size: 15px; padding: 15px 10px 5px; margin: 0; text-align: center; color: var(--black); }
        .related-link { display: block; text-align: center; color: var(--gold); font-size: 12px; font-weight: bold; padding-bottom: 15px; }

        .btn-all { display: inline-block; margin-top: 30px; padding: 12px 30px; background: var(--black); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 14px; }

        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } .container { padding: 20px; margin: 20px auto; } }
    </style>
</head>
<body>

<div id="product-view" class="container">
    <div class="product-header">
        <h1 id="p-name" class="product-name">جاري التحميل...</h1>
        <span class="product-brand">Habib Store | Premium Turkish Nageel</span>
    </div>

    <div class="img-wrapper">
        <img id="p-img" src="../assets/images/nageel/modern-landscape-design.jpg" alt="Product Image" class="product-image">
    </div>

    <div id="dynamic-info">
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">المواصفات / المقاس:</span>
                <span id="p-size" class="info-value">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">المنشأ والجودة:</span>
                <span id="p-origin" class="info-value">تركي - نخب أول</span>
            </div>
        </div>

        <div class="description-section">
            <p id="p-desc" class="description-text"></p>
        </div>
    </div>

    <a id="p-whatsapp" href="#" class="btn-whatsapp">
        <i class="fab fa-whatsapp"></i> اطلب السعر والمعاينة الآن
    </a>

    <div class="related-section">
        <h3 class="related-title"><i class="fas fa-gem"></i> منتجات مكملة (زلط ورخام):</h3>
        <div id="related-slider" class="related-slider">
            </div>
        <div style="text-align: center;">
            <a href="zalat-gallery.html" class="btn-all">عرض معرض الأحجار والرخام كاملاً</a>
        </div>
    </div>
</div><script>
    // 🟠 قاعدة بيانات النجيل التركي الموحدة (مطابقة لصفحة المعرض)
    const nageelProducts = {
        "1": { name: "Habib Anatolian Nature", size: "Natural Texture", desc: "نجيل تركي يحاكي الطبيعة الأناضولية بألوان متداخلة مذهلة، ملمس طبيعي 100% ومقاوم للأشعة فوق البنفسجية.", img: "Habib Anatolian Nature.jpg" },
        "2": { name: "Habib Antalya Breeze (30mm)", size: "30mm", desc: "نسيم أنطاليا: نجيل صناعي ناعم جداً، يجمع بين النعومة الفائقة واللون الأخضر الزاهي للبلكونات والروف وجلسات الاسترخاء.", img: "Habib Antalya Breeze (30mm).jpg" },
        "3": { name: "Habib Bosphorus Green (50mm)", size: "50mm", desc: "خضرة البسفور: الارتفاع الأعلى لإحساس الرفاهية الكاملة، كثافة عشبية فائقة مخصصة للقصور والفلل الفاخرة التي تبحث عن التميز.", img: "Habib Bosphorus Green (50mm).jpg" },
        "4": { name: "Habib Bosphorus Silk", size: "Silk Touch", desc: "ملمس حريري فائق النعومة، نجيل تركي مخصص لجلسات الروف والحدائق المريحة وآمن تماماً للأطفال والحيوانات الأليفة.", img: "Habib Bosphorus Silk.jpg" },
        "5": { name: "Habib Istanbul Lush (40mm)", size: "40mm", desc: "إسطنبول لوش: مزيج تركي مثالي من الكثافة والمتانة، يعطي مظهراً جذاباً يدوم لسنوات طويلة دون أن يتأثر بعوامل الجو.", img: "Habib Istanbul Lush (40mm).jpg" },
        "6": { name: "Habib Izmir Spring", size: "Spring Green", desc: "ربيع إزمير: ألوان حيوية تمنح حديقتك إشراقة دائمة، مع ألياف مرنة تعود لوضعها الطبيعي فورياً بعد الضغط عليها.", img: "Habib Izmir Spring.jpg" },
        "7": { name: "Habib Marmara Turf", size: "Heavy Duty", desc: "نجيل مرمرة: المنتج الأقوى للتحمل، مصمم خصيصاً للاستخدام الشاق والمناطق ذات الحركة الكثيفة مع ضمان الثبات.", img: "Habib Marmara Turf.jpg" },
        "8": { name: "Habib Premium Eco (40mm)", size: "40mm", desc: "الفئة الاقتصادية بجودة تركية: مظهر فندقي رائع بسعر منافس، مثالي للمساحات الواسعة وتنسيق الحدائق الكبيرة.", img: "grass-40mm-natural.jpeg" },
        "9": { name: "Habib Standard Turkish (20mm)", size: "20mm", desc: "النجيل التركي العملي: ارتفاع بسيط وسهولة فائقة في التنظيف، الاختيار الذكي للمداخل والممرات الخارجية ومواقف السيارات.", img: "grass-20mm-standard-12.jpeg" }
    };

    // 🟠 منتجات الزلط والرخام (تظهر في السلايدر فقط)
    const stoneProducts = [
        { name: "زلط أبيض رخامي", img: "zalat/zalat-white-marble-v1.jpeg" },
        { name: "زلط أسود بركاني", img: "zalat/zalat-black-volcanic.jpeg" },
        { name: "رخام كرارة براون", img: "marble/marble-carrara-milli-brown.jpg" },
        { name: "حجر ميكا رمادي", img: "marble/stone-mica-grey.jpg" },
        { name: "زلط رويال ملون", img: "zalat/zalat-mixed.jpeg" }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id'); 
    const p = nageelProducts[productId];

    if (p) {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-desc').innerText = p.desc;
        document.getElementById('p-img').src = "../assets/images/nageel/" + p.img;
        document.title = p.name + " | حبيب ستون";

        const waText = encodeURIComponent("السلام عليكم حبيب ستون، أرغب في الاستفسار عن نجيل: " + p.name);
        document.getElementById('p-whatsapp').href = "https://wa.me/201016961497?text=" + waText;
    } else {
        document.getElementById('product-view').innerHTML = "<h2 style='text-align:center; padding:100px;'>المنتج غير موجود، يرجى العودة للمعرض.</h2>";
    }

    // 🟠 تشغيل السلايدر للمنتجات المكملة
    let sliderHTML = '';
    stoneProducts.forEach(item => {
        sliderHTML += `
            <div class="related-card">
                <img src="../assets/images/${item.img}" onerror="this.src='../assets/images/nageel/modern-landscape-design.jpg'">
                <h4>${item.name}</h4>
                <span class="related-link">عرض المنتج ←</span>
            </div>`;
    });
    document.getElementById('related-slider').innerHTML = sliderHTML;
</script>
</body>
</html>
