<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">حبيب ستون | تفاصيل المنتج</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --black: #111; --white: #ffffff; --light-gray: #f8f9fa; --text-muted: #666; }
        
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        /* الحاوية الرئيسية */
        .container { max-width: 1000px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); position: relative; border-top: 6px solid var(--main-green); }
        
        .product-header { text-align: center; margin-bottom: 35px; }
        .product-name { font-family: 'Amiri', serif; font-size: clamp(28px, 5vw, 40px); color: var(--main-green); font-weight: 800; margin: 0; }
        .product-brand { color: var(--gold); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; display: block; }

        /* منطقة العرض */
        .img-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 35px; background: #eee; border: 1px solid #e0e0e0; }
        .product-image { width: 100%; max-height: 500px; object-fit: cover; display: block; transition: 0.4s ease; }

        /* تفاصيل البيانات */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; }
        .info-item { background: var(--light-gray); padding: 20px; border-radius: 10px; border-right: 4px solid var(--gold); }
        .info-label { font-size: 13px; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 5px; }
        .info-value { font-size: 18px; color: var(--black); font-weight: 700; }

        /* الوصف */
        .description-section { margin-bottom: 40px; padding: 25px; background: #fffdf9; border-radius: 12px; border: 1px solid #f1e6cc; }
        .description-text { font-size: 19px; color: #444; text-align: justify; font-family: 'Amiri', serif; line-height: 2; margin: 0; }

        /* أزرار التواصل */
        .action-area { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 20px; text-decoration: none; border-radius: 10px; font-size: 20px; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .btn-whatsapp { background: #25D366; color: white; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); }
        .btn-whatsapp:hover { background: #128C7E; transform: translateY(-3px); }

        /* المنتجات المقترحة */
        .related-section { margin-top: 60px; border-top: 1px solid #eee; padding-top: 40px; }
        .related-title { font-family: 'Amiri', serif; font-size: 26px; color: var(--main-green); margin-bottom: 25px; text-align: right; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .related-card { text-decoration: none; color: inherit; background: white; border: 1px solid #eee; border-radius: 12px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .related-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .related-card img { width: 100%; height: 150px; object-fit: cover; }
        .related-body { padding: 15px; text-align: center; }
        .related-body h4 { font-size: 15px; margin: 0 0 10px; font-weight: 700; }
        .related-link { color: var(--gold); font-size: 13px; font-weight: bold; }

        .btn-gallery { display: inline-block; padding: 15px 40px; background: var(--black); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; margin-top: 30px; transition: 0.3s; }
        .btn-gallery:hover { background: var(--gold); }

        #error-view { display: none; text-align: center; padding: 100px 20px; }

        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } .container { padding: 20px; } }
    </style>
</head>
<body>

<div id="product-view" class="container" style="display:none;">
    <div class="product-header">
        <h1 id="p-name" class="product-name">جاري تحميل البيانات...</h1>
        <span class="product-brand">Habib Stone | Premium Selection</span>
    </div>

    <div class="img-wrapper">
        <img id="p-img" src="" alt="" class="product-image" onerror="this.src='../assets/images/logo.png'">
    </div>

    <div class="info-grid">
        <div class="info-item">
            <span class="info-label">الأبعاد / القياسات:</span>
            <span id="p-size" class="info-value">--</span>
        </div>
        <div class="info-item">
            <span class="info-label">المواصفات الفنية:</span>
            <span id="p-density" class="info-value">--</span>
        </div>
    </div>

    <div class="description-section">
        <p id="p-desc" class="description-text"></p>
    </div>

    <div class="action-area">
        <a id="p-whatsapp" href="#" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> الاستفسار عن الأسعار وتحديد موعد معاينة
        </a>
    </div>

    <div class="related-section">
        <h3 class="related-title"><i class="fas fa-layer-group"></i> خيارات إضافية لتنسيق الحدائق:</h3>
        <div id="related-grid" class="related-grid"></div>
        <div id="gallery-nav" style="text-align:center;"></div>
    </div>
</div>

<div id="error-view" class="container">
    <h2 style="color:var(--main-green); font-family:'Amiri';">عذراً، المنتج المطلوب غير متوفر حالياً</h2>
    <p>قد يكون الرابط غير صحيح أو جاري تحديث البيانات الفنية للصنف.</p>
    <a href="../index.html" class="btn-gallery">العودة للصفحة الرئيسية</a>
</div>

<script>
    // قاعدة البيانات الاحترافية
    const products = {
        // نجيل
        "1": { cat: "nageel", name: "نجيل سوبر رويال - 50 ملم", size: "ارتفاع 5 سم", density: "كثافة عالية (فئة القصور)", img: "nageel/grass-50mm-natural.jpeg", desc: "يمثل نجيل سوبر رويال قمة الفخامة في المسطحات الخضراء الصناعية. يتميز بنعومة فائقة وكثافة ألياف تحاكي العشب الطبيعي تماماً، مع مقاومة عالية للأشعة فوق البنفسجية لضمان ثبات اللون لسنوات طويلة." },
        "2": { cat: "nageel", name: "نجيل أسطوري 40 ملم (28 غرزة)", size: "ارتفاع 4 سم", density: "28 غرزة (شديد التحمل)", img: "nageel/grass-40mm-natural-28.jpeg", desc: "صُمم هذا النوع للمساحات ذات الاستخدام الكثيف. بفضل كثافة الـ 28 غرزة، يوفر ملمساً ممتلئاً ومرونة عالية تمنع هبوط الألياف، مما يجعله مثالياً لمناطق اللعب والجلسات العائلية." },
        "101": { cat: "zalat", name: "زلط أبيض رخامي ناصع V1", size: "أحجام منتقاة", density: "نخب أول مستورد", img: "zalat/zalat-white-marble-v1.jpeg", desc: "زلط أبيض رخامي طبيعي يتميز بنقاء اللون ونعومة الملمس. يعطي تبايناً بصرياً رائعاً عند دمجه مع المساحات الخضراء، ويمنح الحديقة طابعاً كلاسيكياً فاخراً." },
        "301": { cat: "marble", name: "رخام كرارة ملي براون", size: "ألواح ديكورية", density: "جودة بريميوم", img: "marble/marble-carrara-milli-brown.jpg", desc: "يجمع بين عروق الكرارة الإيطالية واللمسات البنية الدافئة. يُعد اختياراً مثالياً لتكسية الحوائط الديكورية والواجهات التي تبحث عن الفخامة العصرية." },
        "307": { cat: "marble", name: "حجر ميكا رمادي (واجهات)", size: "شرائح طبيعية", density: "طبيعي 100%", img: "marble/stone-mica-grey.jpg", desc: "حجر الميكا الطبيعي يتميز بمتانته الفائقة وعزله للحرارة. يعطي الواجهات مظهراً معمارياً حديثاً وثباتاً في الألوان يقاوم كافة العوامل الجوية." }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const p = products[productId];

    if (p) {
        document.getElementById('product-view').style.display = 'block';
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-density').innerText = p.density;
        document.getElementById('p-desc').innerText = p.desc;
        
        // مسار الصور المعتمد
        document.getElementById('p-img').src = "../assets/images/" + p.img;
        document.title = `${p.name} | حبيب ستون`;

        // رسالة الواتساب الرسمية
        const waText = `السلام عليكم حبيب ستون، أود الاستفسار عن تفاصيل وأسعار المنتج التالي: ${p.name} (كود: ${productId})`;
        document.getElementById('p-whatsapp').href = `https://wa.me/201016961497?text=${encodeURIComponent(waText)}`;

        // المنتجات ذات الصلة
        let others = Object.keys(products).filter(id => products[id].cat !== p.cat);
        others.sort(() => Math.random() - 0.5);
        let relatedHTML = '';
        others.slice(0, 4).forEach(id => {
            relatedHTML += `
                <a href="product.html?id=${id}" class="related-card">
                    <img src="../assets/images/${products[id].img}" onerror="this.src='../assets/images/logo.png'">
                    <div class="related-body">
                        <h4>${products[id].name}</h4>
                        <span class="related-link">عرض التفاصيل ←</span>
                    </div>
                </a>`;
        });
        document.getElementById('related-grid').innerHTML = relatedHTML;

        // روابط المعرض الاحترافية
        let targetL = (p.cat === "nageel") ? "zalat-gallery.html" : "grass-gallery.html";
        let targetT = (p.cat === "nageel") ? "معرض الأحجار والزلط الديكوري" : "مجموعة النجيل الصناعي الفاخر";
        document.getElementById('gallery-nav').innerHTML = `<a href="${targetL}" class="btn-gallery">تصفح ${targetT}</a>`;

    } else {
        document.getElementById('error-view').style.display = 'block';
    }
</script>
</body>
</html>
