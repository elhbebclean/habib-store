<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Habib Stone | Luxury Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --text-dark: #333; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: #fdfdfd; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--main-green); }
        .product-name { font-family: 'Amiri', serif; font-size: 36px; color: var(--main-green); text-align: center; margin-bottom: 15px; }
        .product-image { width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; margin-bottom: 25px; border: 1px solid #eee; background: #f0f0f0; }
        .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: #fafafa; border-radius: 12px; overflow: hidden; }
        .spec-table td { padding: 15px 20px; border-bottom: 1px solid #eee; font-size: 18px; }
        .spec-label { font-weight: bold; color: var(--main-green); width: 40%; background: #f0f4f0; }
        .description { line-height: 2; font-size: 20px; color: #444; margin-bottom: 30px; text-align: justify; padding: 0 15px; border-right: 5px solid var(--main-green); font-family: 'Amiri', serif; }
        .whatsapp-btn { display: block; text-align: center; background: #25D366; color: white; padding: 20px; text-decoration: none; border-radius: 50px; font-size: 22px; font-weight: bold; box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2); }
        
        /* الكروت اللي من تحت */
        .suggestions-box { margin-top: 40px; padding-top: 30px; border-top: 2px solid #eee; }
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { text-decoration: none; color: inherit; background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card h4 { font-size: 14px; margin: 10px 0; padding: 0 5px; }
        @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1 id="p-name" class="product-name">جاري تحميل الفخامة...</h1>
    <img id="p-img" src="" alt="" class="product-image">
    <table class="spec-table">
        <tr><td class="spec-label">الارتفاع:</td><td id="p-size">--</td></tr>
        <tr><td class="spec-label">الكثافة:</td><td id="p-density">--</td></tr>
        <tr><td class="spec-label">المنشأ:</td><td id="p-origin">--</td></tr>
    </table>
    <div id="p-desc" class="description"></div>
    <a id="p-whatsapp" href="#" class="whatsapp-btn">اطلب السعر الآن | واتساب</a>
    <div class="suggestions-box">
        <h3 style="text-align:center; color:var(--main-green); font-family:'Amiri';">إضافات تكتمل بها فخامتك</h3>
        <div id="cards-area" class="cards-grid"></div>
    </div>
</div><script>
    const allProducts = {
        "1": { cat: "nageel", name: "Habib Izmir Spring", size: "50 ملم (5 سم)", density: "16 غرزة / نسيج ملكي", origin: "تركيا 🇹🇷", img: "nageel/Habib Izmir Spring.jpg", desc: "أفخم نجيل صناعي بارتفاع 5 سم، يمنحك ملمس الطبيعة الخالدة." },
        "2": { cat: "nageel", name: "Habib Istanbul Lush (40mm)", size: "40 ملم (4 سم)", density: "28 غرزة / فائق الكثافة", origin: "تركيا 🇹🇷", img: "nageel/Habib Istanbul Lush (40mm).jpg", desc: "كثافة غرز لا تُضاهى، صمم خصيصاً للمساحات التي تتطلب رفاهية مستمرة." },
        "3": { cat: "nageel", name: "Habib Bosphorus Green (50mm)", size: "50 ملم (5 سم)", density: "18 غرزة / مزدوج", origin: "تركيا 🇹🇷", img: "nageel/Habib Bosphorus Green (50mm).jpg", desc: "لون أخضر زاهي ومتانة فائقة بفضل النسيج المزدوج." },
        "101": { cat: "marble", name: "خردة رخام أبيض ملكي", size: "مقاسات متنوعة", density: "فرز أول", origin: "مصر 🇪🇬", img: "marble/marble-sample.jpg", desc: "الرخام الملكي هو اللمسة الأرستقراطية لممرات حديقتك." },
        "201": { cat: "zalat", name: "زلط ديكور يوناني", size: "جامبو ناعم", density: "مستورد ناصع", origin: "اليونان 🇬🇷", img: "zalat/white-pebbles.jpg", desc: "زلط أبيض مستورد يضيف تبايناً مذهلاً مع المساحات الخضراء." }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id') || "1"; 
    const p = allProducts[productId];

    if (p) {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-density').innerText = p.density;
        document.getElementById('p-origin').innerText = p.origin;
        document.getElementById('p-desc').innerText = p.desc;
        document.getElementById('p-img').src = "../assets/images/" + p.img;
        
        const waMsg = `استفسار عن حجز: ${p.name}`;
        document.getElementById('p-whatsapp').href = `https://wa.me/201016961497?text=${encodeURIComponent(waMsg)}`;

        let cardsHTML = '';
        for (let id in allProducts) {
            if (allProducts[id].cat !== p.cat) {
                cardsHTML += `
                    <a href="product.html?id=${id}" class="card">
                        <img src="../assets/images/${allProducts[id].img}">
                        <h4>${allProducts[id].name}</h4>
                    </a>`;
            }
        }
        document.getElementById('cards-area').innerHTML = cardsHTML;
    } else {
        document.querySelector('.container').innerHTML = '<h2 style="text-align:center; padding:50px;">عذراً، المنتج غير متاح حالياً.</h2>';
    }
</script>
</body>
</html>
