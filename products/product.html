<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Habib Store | الفخامة الملكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-green: #1a5d1a; --gold: #AF944F; --black: #111; --white: #ffffff; --light-gray: #f8f9fa; }
        
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        
        /* الحاوية الرئيسية */
        .container { max-width: 950px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); border-top: 8px solid var(--main-green); position: relative; }
        
        /* العنوان */
        .product-header { text-align: center; margin-bottom: 30px; }
        .product-name { font-family: 'Amiri', serif; font-size: clamp(30px, 6vw, 42px); color: var(--main-green); font-weight: 800; margin: 0; }
        .product-sub { color: var(--gold); font-size: 14px; font-weight: 700; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* عرض الصورة */
        .img-wrapper { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #eee; margin-bottom: 35px; }
        .product-image { width: 100%; max-height: 550px; object-fit: cover; display: block; transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .img-wrapper:hover .product-image { transform: scale(1.05); }

        /* المواصفات */
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 35px; }
        .spec-item { background: var(--light-gray); padding: 20px; border-radius: 15px; border-right: 5px solid var(--main-green); }
        .spec-label { font-size: 13px; color: #777; font-weight: 700; margin-bottom: 5px; display: block; }
        .spec-value { font-size: 18px; color: var(--black); font-weight: 800; }

        /* الوصف البياع */
        .description-box { position: relative; padding: 30px; background: #fffdf9; border-radius: 20px; border: 1px dashed var(--gold); margin-bottom: 40px; }
        .description-box i { position: absolute; top: -15px; right: 20px; background: var(--gold); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(175,148,79,0.3); }
        .description-text { line-height: 2.2; font-size: 21px; color: #444; text-align: justify; font-family: 'Amiri', serif; margin: 0; }

        /* زر الواتساب */
        .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 15px; background: #25D366; color: white; padding: 22px; text-decoration: none; border-radius: 50px; font-size: 24px; font-weight: 800; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); transition: 0.4s; }
        .whatsapp-btn:hover { background: #128C7E; transform: translateY(-5px); }

        /* المقترحات (نظام الروح المتجددة) */
        .related-section { margin-top: 60px; border-top: 2px solid #eee; padding-top: 40px; }
        .related-title { font-family: 'Amiri', serif; font-size: 28px; color: var(--main-green); margin-bottom: 30px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .related-card { text-decoration: none; color: inherit; background: white; border: 1px solid #eee; border-radius: 15px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .related-card:hover { transform: translateY(-7px); border-color: var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .related-card img { width: 100%; height: 150px; object-fit: cover; }
        .related-card-info { padding: 15px; text-align: center; }
        .related-card-info h4 { font-size: 15px; margin: 0 0 10px; color: #333; font-weight: 700; height: 40px; overflow: hidden; }
        .related-card-info span { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 20px; }

        .cta-gallery-wrapper { text-align: center; margin-top: 40px; }
        .cta-gallery-btn { display: inline-block; padding: 18px 45px; background: var(--black); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 18px; transition: 0.3s; border: 2px solid var(--black); }
        .cta-gallery-btn:hover { background: transparent; color: var(--black); }

        @media (max-width: 600px) { .spec-grid { grid-template-columns: 1fr; } .container { padding: 20px; margin: 20px auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="product-header">
        <h1 id="p-name" class="product-name">جاري تحميل الفخامة...</h1>
        <p id="p-sub" class="product-sub">HABIB STONE - اختيار الصفوة</p>
    </div>

    <div class="img-wrapper">
        <img id="p-img" src="" alt="" class="product-image">
    </div>

    <div class="spec-grid">
        <div class="spec-item">
            <span class="spec-label"><i class="fas fa-ruler-vertical"></i> الارتفاع / المقاس:</span>
            <span id="p-size" class="spec-value">--</span>
        </div>
        <div class="spec-item">
            <span class="spec-label"><i class="fas fa-layer-group"></i> الكثافة / الفئة:</span>
            <span id="p-density" class="spec-value">--</span>
        </div>
    </div>

    <div class="description-box">
        <i class="fas fa-quote-right"></i>
        <p id="p-desc" class="description-text"></p>
    </div>

    <a id="p-whatsapp" href="#" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> اطلب معاينة وسعر الآن (واتساب)
    </a>

    <div class="related-section">
        <h3 class="related-title"><i class="fas fa-magic"></i> لمسات تكتمل بها فخامة مكانك:</h3>
        <div id="related-grid" class="related-grid"></div>
        <div id="gallery-cta-wrapper" class="cta-gallery-wrapper"></div>
    </div>
</div>

<script>
    // 🦈 الدفتر العالمي المطور - نجيل + رخام + زلط + ميكا (220 صنف)
    const products = {
        // --- [1] النجيل التركي (IDs: 1 - 50) ---
        "1": { cat: "nageel", name: "نجيل سوبر رويال - 50 ملم", size: "50 ملم (5 سم)", density: "كثافة القصور الفاخرة", img: "nageel/grass-50mm-natural.jpeg", desc: "هل تبحث عن الرفاهية المطلقة؟ نجيل سوبر رويال بارتفاع 5 سم هو الاختيار الأول للفيلات والقصور الراقية. يتميز بملمس طبيعي فائق النعومة يحاكي العشب الطبيعي البكر، مع قدرة مذهلة على تحمل أشعة الشمس المباشرة لسنوات دون تغيير في زهوة ألوانه. بساط ملكي يحول حديقتك لواحة خضراء لا تقاوم." },
        "2": { cat: "nageel", name: "نجيل أسطوري 40 ملم (28 غرزة)", size: "40 ملم (4 سم)", density: "28 غرزة (فائقة)", img: "nageel/grass-40mm-natural-28.jpeg", desc: "القوة والجمال في منتج واحد. صُمم خصيصاً للمساحات التي تشهد حركة كثيفة ولعب أطفال، حيث تحافظ الغرز الـ 28 على مظهر النجيل ممتلئاً وحيوياً لسنوات دون أن يهبط، مع الحفاظ على ملمس ناعم وآمن تماماً." },
        "3": { cat: "nageel", name: "نجيل ملكي 40 ملم (24 غرزة)", size: "40 ملم (4 سم)", density: "24 غرزة (كثيفة)", img: "nageel/grass-40mm-natural-24.jpeg", desc: "التوازن المثالي بين الفخامة والسعر. اختيار الصفوة لتنسيق الروف والحدائق المنزلية، يمنحك مظهراً طبيعياً جداً وراحة بصرية لا توصف. نخب أول تركي بضمان حبيب ستون، يتميز بسهولة التنظيف ومقاومة العوامل الجوية." },
        "4": { cat: "nageel", name: "نجيل فندقي 40 ملم بريميوم", size: "40 ملم (4 سم)", density: "المظهر الطبيعي الناعم", img: "nageel/grass-40mm-natural.jpeg", desc: "أناقة الفنادق العالمية في منزلك. يتميز بتدرج ألوان رائع يجعله يبدو حقيقياً 100% تحت ضوء الشمس، مما يعطي فخامة فورية للممرات والحدائق المفتوحة. ناعم جداً على الأقدام وصديق للبيئة." },
        "9": { cat: "nageel", name: "نجيل 20 ملم ستاندرد", size: "20 ملم (2 سم)", density: "12 غرزة (عملي)", img: "nageel/grass-20mm-standard-12.jpeg", desc: "الحل الذكي والعملي لتغطية المساحات الواسعة والممرات. بساط منظم بلمسة جمالية تركية، يوفر لك النظافة والأناقة بتكلفة اقتصادية جداً، مثالي للمساحات العامة التي تبحث عن مظهر جذاب ونظيف." },

        // --- [2] الزلط الديكوري (IDs: 101 - 150) ---
        "101": { cat: "zalat", name: "زلط أبيض رخامي فاخر V1", size: "جامبو ناعم", density: "نخب أول مستورد", img: "zalat/zalat-white-marble-v1.jpeg", desc: "اللمسة الأرستقراطية التي تبرز جمال النجيل الأخضر. زلط أبيض رخامي نقي يعمل كبرواز طبيعي لحديقتك، مما يعطي انطباعاً بالنظافة والاتساع الفوري للمكان. لونه ثابت ولا يتأثر بالماء، مما يجعله القطعة الأهم في ديكور اللاندسكيب." },
        "103": { cat: "zalat", name: "زلط أسود بركاني طبيعي", size: "أحجام طبيعية", density: "أصلي بركاني", img: "zalat/zalat-black-volcanic.jpeg", desc: "عشاق التصميمات المودرن يفضلون الزلط البركاني الأسود. لونه الفخم يخلق تبايناً مذهلاً مع النجيل الأخضر، وهو حجر طبيعي صلب لا يتأثر بالعوامل الجوية، مما يضمن لك جمالاً باقياً لسنوات طويلة." },
        "107": { cat: "zalat", name: "زلط أسيوطي فاخر نخب أول", size: "متنوع الأشكال", density: "فرز أول ممتاز", img: "zalat/zalat-asyuti-v2.jpeg", desc: "الأصالة المصرية الممزوجة بالمتانة العالية. زلط أسيوطي منتقى بعناية ليناسب أقوى الديكورات الخارجية، يتميز بألوانه الدافئة التي تعطي روحاً للممرات والحدائق الحجرية." },

        // --- [3] الرخام والميكا (IDs: 301 - 350) ---
        "301": { cat: "marble", name: "رخام كرارة ملي براون", size: "شرائح فاخرة", density: "نخب أول", img: "marble/marble-carrara-milli-brown.jpg", desc: "سحر الرخام الإيطالي الممزوج بلمسات البراون الدافئة. اختيارك الأول لتجعل أركان منزلك تنطق بالفخامة، نسيج طبيعي فريد يزداد جمالاً مع الإضاءة المركزة، مثالي للحوائط الديكورية والتابلوهات الحجرية." },
        "302": { cat: "marble", name: "رخام كريستال وايت ناصع", size: "مقاسات خاصة", density: "نخب أول", img: "marble/marble-crystal-white.jpg", desc: "بياض الكريستال الذي يمنح المكان إشراقاً واتساعاً غير محدود. رخام عالي الجودة يعكس الرقي في كل تفصيلة، مثالي للتابلوهات الحجرية والديكورات الراقية التي تبحث عن الفخامة الهادئة." },
        "307": { cat: "marble", name: "حجر ميكا رمادي (تجليد واجهات)", size: "شرائح طبيعية", density: "طبيعي 100%", img: "marble/stone-mica-grey.jpg", desc: "الخيار العصري لواجهات الفيلات والتشطيبات المودرن. لون رمادي ثابت وشكل حجري فخم يعمل كعازل طبيعي للحرارة، يمنح واجهة منزلك قوة وتحمل جبارة مع مظهر جمالي لا تنتهي موضته." },
        "308": { cat: "marble", name: "حجر ميكا أحمر حراري", size: "شرائح خاصة", density: "طبيعي حراري", img: "marble/stone-mica-red.jpg", desc: "دفء الطبيعة في حجر الميكا الأحمر. يتميز بمتانته العالية ومقاومته للحرارة، مما يجعله مثالي للديكورات الخارجية والداخلية الجريئة التي تعبر عن الشخصية القوية للمكان." }
    };

    // --- 🚀 محرك تشغيل حبيب ستون الذكي ---
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id') || "1";
    const p = products[productId];

    if (p) {
        // 1. تحديث البيانات الأساسية
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-size').innerText = p.size;
        document.getElementById('p-density').innerText = p.density;
        document.getElementById('p-desc').innerText = p.desc;
        document.getElementById('p-img').src = "../assets/images/" + p.img;
        document.getElementById('p-img').alt = p.name;
        document.title = p.name + " | حبيب ستون";

        // 2. زرار الواتساب (بياع)
        const waMsg = `أهلاً حبيب ستون، أريد حجز معاينة ومعرفة سعر منتج: ${p.name} (كود: ${productId})`;
        document.getElementById('p-whatsapp').href = `https://wa.me/201016961497?text=${encodeURIComponent(waMsg)}`;

        // 3. 🎲 محرك "الروح" (Related Products) - عشوائية 100%
        // بنختار 4 منتجات عشوائية من فئة "مختلفة" عشان الزبون يكمل الطقم
        let otherItems = Object.keys(products).filter(id => products[id].cat !== p.cat);
        otherItems.sort(() => Math.random() - 0.5); // لخبطة عشوائية في كل ريفريش

        let relatedHTML = '';
        otherItems.slice(0, 4).forEach(id => {
            relatedHTML += `
                <a href="product.html?id=${id}" class="related-card">
                    <img src="../assets/images/${products[id].img}" onerror="this.src='../assets/images/logo.png'">
                    <div class="related-card-info">
                        <h4>${products[id].name}</h4>
                        <span>استكشف الفخامة ←</span>
                    </div>
                </a>`;
        });
        document.getElementById('related-grid').innerHTML = relatedHTML;

        // 4. 🔘 زرار "تعالي يا باشا" الديناميكي
        // لو المنتج نجيل -> الزرار يوديه معرض الزلط. لو ديكور -> يوديه معرض النجيل.
        let targetLink = (p.cat === "nageel") ? "zalat-gallery.html" : "nageel-gallery.html";
        let targetText = (p.cat === "nageel") ? "عالم الزلط والرخام" : "تشكيلة النجيل التركي";
        document.getElementById('gallery-cta-wrapper').innerHTML = `
            <a href="${targetLink}" class="cta-gallery-btn">
                تعالى يا باشا خد فكرة في معرض ${targetText} ←
            </a>`;

    } else {
        // حالة الطوارئ: لو الـ ID غلط
        document.querySelector('.container').innerHTML = `
            <div style="text-align:center; padding:100px 20px;">
                <i class="fas fa-exclamation-circle" style="font-size:60px; color:var(--gold); margin-bottom:20px;"></i>
                <h2 style="color:var(--main-green); font-family:'Amiri';">نعتذر يا فندم، هذا المنتج غير متوفر حالياً.</h2>
                <a href="../index.html" style="color:var(--main-green); font-weight:bold; text-decoration:none; display:inline-block; margin-top:20px; border:1px solid var(--main-green); padding:10px 25px; border-radius:50px;">العودة للرئيسية</a>
            </div>`;
    }
</script>

</body>
</html>
