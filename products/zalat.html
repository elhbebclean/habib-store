<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الزلط الفاخر | حبيب ستور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .gallery-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .gallery-title { text-align: center; color: #333; font-size: 2.5rem; margin-bottom: 40px; }
        
        /* تصميم الشبكة اللي كان فيه كل الصور */
        .zalat-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .zalat-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            transition: 0.3s; 
            text-decoration: none; 
            color: inherit; 
            display: block;
        }
        .zalat-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .zalat-card img { width: 100%; height: 220px; object-fit: cover; }
        .zalat-info { padding: 20px; text-align: center; }
        .zalat-info h3 { margin: 0; font-size: 1.2rem; color: #444; }
        .btn-view { display: inline-block; margin-top: 15px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="gallery-container">
        <h1 class="gallery-title">مجموعة الزلط والأحجار الطبيعية</h1>
        <div class="zalat-grid" id="zalatGallery">
            </div>
    </div>
    <script>
        // مصفوفة الزلط الرسمية المربوطة بفولدر assets/images/zalat/
        const zalatItems = {
            'zalat-asyuti': { title: 'Zalat Asyuti V2', img: 'zalat-asyuti-v2.jpeg' },
            'zalat-black-royal': { title: 'Zalat Black Royal', img: 'zalat-black-royal.jpg' },
            'zalat-black-volcanic': { title: 'Zalat Black Volcanic', img: 'zalat-black-volcanic.jpeg' },
            'zalat-white-v1': { title: 'White Marble V1', img: 'zalat-white-marble-v1.jpeg' },
            'zalat-white-v2': { title: 'White Marble V2', img: 'zalat-white-marble-v2.jpeg' },
            'zalat-light-gray': { title: 'Zalat Light Gray', img: 'zalat-light-gray.jpg' },
            'zalat-mix-v1': { title: 'Zalat Mix Colors V1', img: 'zalat-mix-colors.jpeg' },
            'zalat-mix-v2': { title: 'Zalat Mix Colors V2', img: 'zalat-mix-colors_.jpg' },
            'zalat-red-volcanic': { title: 'Red Volcanic Stone', img: 'zalat-red-volcanic.jpeg' },
            'white-zalat': { title: 'Pure White Zalat', img: 'white-zalat.jpg' },
            'zalat-luxury': { title: 'Luxury Garden Ideas', img: 'zalat-garden-ideas-luxury.jpg' }
        };

        const gallery = document.getElementById('zalatGallery');

        // بناء المعرض وربطه بصفحة الوصف white-marble.html
        Object.keys(zalatItems).forEach(key => {
            gallery.innerHTML += `
                <a href="white-marble.html?id=${key}" class="zalat-card">
                    <img src="../assets/images/zalat/${zalatItems[key].img}" 
                         alt="${zalatItems[key].title}" 
                         onerror="this.src='../assets/images/nageel-details/Habib-Istanbul-Lush-40mm.jpg'">
                    <div class="zalat-info">
                        <h3>${zalatItems[key].title}</h3>
                        <span class="btn-view">عرض التفاصيل <i class="fas fa-arrow-left"></i></span>
                    </div>
                </a>`;
        });
    </script>
</body>
</html>
