<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABIB STORE | الفخامة في عالم اللاندسكيب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--black); overflow-x: hidden; }

        /* الهيدر الزجاجي الفخم */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Amiri', serif; font-size: 32px; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* الـ Hero Section */
        .hero { 
            height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: #fff; margin-top: 60px;
        }
        .hero h1 { font-family: 'Amiri', serif; font-size: 55px; margin-bottom: 10px; color: var(--black); }
        .hero p { font-weight: 300; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        /* شبكة المنتجات */
        .container { max-width: 1400px; margin: auto; padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .product-card { 
            background: #fff; position: relative; transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden; border-radius: 0px; border-bottom: 1px solid #eee;
        }
        .product-card:hover { transform: translateY(-10px); }
        
        .img-container { width: 100%; height: 400px; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s; }
        .product-card:hover img { transform: scale(1.1); }

        .badge { position: absolute; top: 20px; left: 20px; background: var(--gold); color: white; padding: 5px 15px; font-size: 12px; font-weight: bold; z-index: 10; }

        .info { padding: 25px 0; text-align: right; }
        .info h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
        .info .category { font-size: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        /* الحاسبة المدمجة */
        .calc-area { margin-top: 15px; background: #f9f9f9; padding: 15px; border-radius: 4px; }
        .calc-area select, .calc-area input { 
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; 
            font-family: 'Cairo'; outline: none;
        }
        .price-display { font-size: 18px; color: var(--gold); font-weight: 600; margin-bottom: 10px; display: block; }

        .btn-luxury { 
            display: block; width: 100%; background: var(--black); color: #fff; 
            text-align: center; text-decoration: none; padding: 15px; font-size: 14px;
            transition: 0.3s; cursor: pointer; border: none;
        }
        .btn-luxury:hover { background: var(--gold); }

        /* أيقونة السلة العائمة */
        .cart-trigger { 
            position: fixed; bottom: 40px; left: 40px; background: var(--black); color: #fff;
            padding: 20px; border-radius: 50%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-decoration: none; z-index: 2000; transition: 0.3s;
        }
        .cart-trigger:hover { background: var(--gold); transform: scale(1.1); }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo">HABIB STORE</a>
    <div style="font-size: 13px; font-weight: 300;">LUXURY LANDSCAPE SOLUTIONS</div>
</header>

<section class="hero" data-aos="fade-up">
    <p>مرحباً بك في عالم الفخامة</p>
    <h1>تشكيلة 2026 الحصرية</h1>
    <div style="width: 50px; height: 1px; background: var(--gold); margin-top: 20px;"></div>
</section>

<div class="container">
    <div class="grid">
        
        <div class="product-card" data-aos="fade-up">
            <div class="badge">الأكثر طلباً</div>
            <div class="img-container">
                <img src="images/grass-main.jpg" id="main-grass-img" alt="Premium Grass">
            </div>
            <div class="info">
                <span class="category">النجيل الصناعي الفاخر</span>
                <h3>نجيل لاندسكيب (كثافات متعددة)</h3>
                
                <div class="calc-area">
                    <select id="grass-select" onchange="updatePrice()">
                        <option value="180" data-name="نجيل تركي فاخر - 40 ملم">نجيل تركي فاخر - 40 ملم</option>
                        <option value="220" data-name="نجيل ميكس (شبه الطبيعي) - 50 ملم">نجيل ميكس (شبه الطبيعي) - 50 ملم</option>
                        <option value="160" data-name="نجيل أخضر زاهي (ملاعب)">نجيل أخضر زاهي (ملاعب)</option>
                        <option value="140" data-name="نجيل اقتصادي - 30 ملم">نجيل اقتصادي - 30 ملم</option>
                    </select>
                    <input type="number" id="grass-size" placeholder="أدخل المساحة بالمتر المربع" oninput="updatePrice()">
                    <span class="price-display" id="total-display">الإجمالي: 0 ج.م</span>
                    <button class="btn-luxury" onclick="addToCart()">احجز الآن وانتقل للسلة ➜</button>
                </div>
            </div>
        </div>

        <div class="product-card" data-aos="fade-up" data-aos-delay="100">
            <div class="img-container">
                <img src="images/white-marble.jpg" alt="White Marble">
            </div>
            <div class="info">
                <span class="category">أحجار ديكور</span>
                <h3>زلط أبيض كريستال ناصع</h3>
                <div class="calc-area">
                    <input type="number" id="pebble-size" placeholder="أدخل الكمية (بالمتر/الشكارة)" oninput="updatePricePebble()">
                    <span class="price-display" id="pebble-total">الإجمالي: 0 ج.م</span>
                    <button class="btn-luxury" onclick="addToCartPebble()">احجز الآن ➜</button>
                </div>
            </div>
        </div>
        
    </div>
</div>

<a href="cart.html" class="cart-trigger">🛒</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    // وظيفة حساب سعر النجيل
    function updatePrice() {
        const pricePerMeter = document.getElementById('grass-select').value;
        const area = document.getElementById('grass-size').value || 0;
        const total = pricePerMeter * area;
        document.getElementById('total-display').innerText = `الإجمالي: ${total.toLocaleString()} ج.م`;
    }

    // وظيفة حساب سعر الزلط
    function updatePricePebble() {
        const area = document.getElementById('pebble-size').value || 0;
        const total = area * 150; // سعر افتراضي للزلط
        document.getElementById('pebble-total').innerText = `الإجمالي: ${total.toLocaleString()} ج.م`;
    }

    // إضافة النجيل للسلة والانتقال
    function addToCart() {
        const select = document.getElementById('grass-select');
        const area = document.getElementById('grass-size').value;
        const pricePerMeter = select.value;

        if (!area || area <= 0) {
            alert('يا حوت، أدخل المساحة الأول!');
            return;
        }

        const product = {
            name: select.options[select.selectedIndex].getAttribute('data-name'),
            area: area,
            price: pricePerMeter * area
        };

        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        cart.push(product);
        localStorage.setItem('habibCart', JSON.stringify(cart));

        // الانتقال لصفحة السلة
        window.location.href = 'cart.html';
    }

    // إضافة الزلط للسلة
    function addToCartPebble() {
        const area = document.getElementById('pebble-size').value;
        if (!area || area <= 0) { alert('أدخل الكمية!'); return; }

        const product = {
            name: 'زلط أبيض كريستال ناصع',
            area: area,
            price: area * 150
        };

        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        cart.push(product);
        localStorage.setItem('habibCart', JSON.stringify(cart));
        window.location.href = 'cart.html';
    }
</script>

</body>
</html>
