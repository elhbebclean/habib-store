
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABIB STORE | الفخامة في عالم اللاندسكيب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--black); overflow-x: hidden; }

        /* الهيدر الزجاجي الفخم */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Amiri', serif; font-size: 32px; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* الـ Hero Section (الواجهة) */
        .hero { 
            height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: #fff; margin-top: 60px;
        }
        .hero h1 { font-family: 'Amiri', serif; font-size: 55px; margin-bottom: 10px; color: var(--black); }
        .hero p { font-weight: 300; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        /* شبكة المنتجات الاحترافية */
        .container { max-width: 1400px; margin: auto; padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .product-card { 
            background: #fff; position: relative; transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden; border-radius: 0px; /* الحواف الحادة أحياناً بتبان أفخم */
        }
        .product-card:hover { transform: translateY(-10px); }
        
        .img-container { width: 100%; height: 400px; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s; }
        .product-card:hover img { transform: scale(1.1); }

        .badge { position: absolute; top: 20px; left: 20px; background: var(--gold); color: white; padding: 5px 15px; font-size: 12px; font-weight: bold; }

        .info { padding: 25px 0; text-align: right; }
        .info h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
        .info .category { font-size: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .price-tag { font-size: 18px; color: #1a1a1a; font-weight: 400; }
        
        .btn-luxury { 
            display: inline-block; margin-top: 15px; color: var(--black); 
            text-decoration: none; border-bottom: 1px solid var(--black);
            padding-bottom: 5px; font-size: 14px; transition: 0.3s;
        }
        .btn-luxury:hover { color: var(--gold); border-color: var(--gold); }

        /* السلة العائمة */
        .cart-trigger { 
            position: fixed; bottom: 40px; left: 40px; background: var(--black); color: #fff;
            padding: 20px; border-radius: 50%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-decoration: none; z-index: 2000; transition: 0.3s;
        }
        .cart-trigger:hover { background: var(--gold); transform: scale(1.1); }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo">HABIB STORE</a>
    <div style="font-size: 13px; font-weight: 300;">LUXURY LANDSCAPE SOLUTIONS</div>
</header>

<section class="hero" data-aos="fade-up">
    <p>مرحباً بك في عالم الفخامة</p>
    <h1>تشكيلة 2026 الحصرية</h1>
    <div style="width: 50px; height: 1px; background: var(--gold); margin-top: 20px;"></div>
</section>

<div class="container">
    <div class="grid">
        <div class="product-card" data-aos="fade-up" data-aos-delay="100">
            <div class="badge">SALE - 15%</div>
            <div class="img-container">
                <img src="images/white-marble.jpg" alt="White Marble">
            </div>
            <div class="info">
                <span class="category">خردة رخام إيطالي</span>
                <h3>رخام أبيض كريستال ناصع</h3>
                <div class="price-tag">150 ج.م <span style="color:#aaa; font-size: 14px;">/ الشكارة</span></div>
                <a href="products/white-marble.html" class="btn-luxury">اكتشف المنتج ➜</a>
            </div>
        </div>
        
        </div>
</div>

<a href="cart.html" class="cart-trigger">🛒</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });
    // تحديث السلة لو محتاج
</script>

</body>
</html>
