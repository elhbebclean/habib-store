<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habib Store | حبيب ستور للرخام واللاندسكيب</title>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        header { background: var(--secondary); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .hero { background: #fff; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* شبكة المنتجات - دي اللي هتشيل الـ 20 منتج */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
            margin-top: 30px; 
        }
        
        .product-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; 
            display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .product-info { padding: 15px; text-align: center; flex-grow: 1; }
        .price { color: var(--primary); font-size: 20px; font-weight: bold; margin: 10px 0; }
        
        .btn-view { display: block; background: var(--secondary); color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-bottom: 5px; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* زر السلة العائم */
        .floating-cart { 
            position: fixed; bottom: 20px; left: 20px; 
            background: var(--success); color: white; padding: 15px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;
        }
    </style>
</head>
<body>

<header>
    <h1>Habib Store 🛒</h1>
    <p>أكبر تشكيلة رخام ولاندسكيب في مصر</p>
</header>

<div class="hero">
    <h2>حول جنينتك لتحفة فنية</h2>
    <p>احسب كميتك، أضف لسلتك، واستلم فاتورتك فوراً</p>
</div>

<div class="container">
    <div class="products-grid" id="main-grid">
        
        <div class="product-card">
            <img src="images/white-marble.jpg" alt="رخام أبيض كريستال">
            <div class="product-info">
                <h3>خردة رخام أبيض كريستال</h3>
                <div class="price">150 ج.م / شكارة</div>
                <a href="products/white-marble.html" class="btn-view">عرض التفاصيل والحساب 📐</a>
                <button class="btn-add" onclick="quickAdd('رخام أبيض كريستال', 150)">🛒 أضف للسلة</button>
            </div>
        </div>

        </div>
</div>

<a href="cart.html" class="floating-cart">
   🛒 السلة (<span id="cart-count">0</span>)
</a>

<script>
    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }
    
    function quickAdd(name, price) {
        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        cart.push({name, price});
        localStorage.setItem('habibCart', JSON.stringify(cart));
        updateCartCount();
        alert('تمت الإضافة للسلة يا حوت! 🛒');
    }

    window.onload = updateCartCount;
</script>

<footer style="text-align: center; padding: 40px; color: #888;">
    <p>© 2026 Habib Store - جميع الحقوق محفوظة</p>
    <a href="policy.html" style="color: #3498db; text-decoration: none;">سياسات المتجر والقوانين</a>
</footer>

</body>
</html>
