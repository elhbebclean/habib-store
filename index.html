<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABIB STORE | الفخامة في عالم اللاندسكيب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --bg: #fdfdfd; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--black); overflow-x: hidden; }

        /* الهيدر الزجاجي الفخم */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Amiri', serif; font-size: 32px; letter-spacing: 3px; color: var(--black); text-decoration: none; }

        /* الـ Hero Section */
        .hero { 
            height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: #fff; margin-top: 60px;
        }
        .hero h1 { font-family: 'Amiri', serif; font-size: clamp(35px, 8vw, 55px); margin-bottom: 10px; color: var(--black); }
        .hero p { font-weight: 300; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        /* شبكة المنتجات */
        .container { max-width: 1400px; margin: auto; padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .product-card { 
            background: #fff; position: relative; transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden; border-radius: 0px; border-bottom: 1px solid #eee;
        }
        .product-card:hover { transform: translateY(-10px); }
        
        .img-container { width: 100%; height: 380px; overflow: hidden; position: relative; background: #f9f9f9; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s; }
        .product-card:hover img { transform: scale(1.1); }

        .badge { position: absolute; top: 20px; left: 20px; background: var(--gold); color: white; padding: 5px 15px; font-size: 11px; font-weight: bold; z-index: 10; }

        .info { padding: 25px 0; text-align: right; }
        .info h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
        .info .category { font-size: 11px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        /* الحاسبة المدمجة في الكارت */
        .calc-box { margin-top: 15px; background: #fcfcfc; padding: 15px; border: 1px solid #f0f0f0; }
        .calc-box select, .calc-box input { 
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; 
            font-family: 'Cairo'; font-size: 13px; outline: none;
        }
        .calc-box .total { font-weight: 600; color: var(--gold); font-size: 16px; margin-bottom: 10px; display: block; }

        .btn-order { 
            display: block; width: 100%; background: var(--black); color: #fff; 
            text-align: center; text-decoration: none; padding: 12px; font-size: 14px;
            transition: 0.3s; cursor: pointer; border: none;
        }
        .btn-order:hover { background: var(--gold); }

        /* سلة المشتريات (Drawer) */
        .side-cart {
            position: fixed; top: 0; left: -100%; width: 350px; height: 100%;
            background: #fff; z-index: 3000; transition: 0.5s; padding: 40px 25px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.1);
        }
        .side-cart.active { left: 0; }
        .side-cart h2 { font-family: 'Amiri'; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-field { margin-bottom: 15px; }
        .cart-field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        .cart-field input, .cart-field select { width: 100%; padding: 12px; border: 1px solid #eee; background: #f9f9f9; font-family: 'Cairo'; }

        .cart-trigger { 
            position: fixed; bottom: 30px; left: 30px; background: var(--black); color: #fff;
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; cursor: pointer; transition: 0.3s;
        }
        .cart-trigger:hover { transform: rotate(15deg) scale(1.1); background: var(--gold); }
        
        .close-cart { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo">HABIB STORE</a>
    <div style="font-size: 11px; font-weight: 300; letter-spacing: 1px;">LUXURY LANDSCAPE SOLUTIONS</div>
</header>

<section class="hero" data-aos="fade-up">
    <p>Shark Selection</p>
    <h1>تشكيلة 2026 الحصرية</h1>
    <div style="width: 40px; height: 1px; background: var(--gold); margin-top: 20px;"></div>
</section>

<div class="container">
    <div class="grid">
        
        <div class="product-card" data-aos="fade-up">
            <div class="badge">الأكثر طلباً</div>
            <div class="img-container">
                <img src="images/grass-hero.jpg" id="grass-img" alt="Premium Grass">
            </div>
            <div class="info">
                <span class="category">النجيل الصناعي الفاخر</span>
                <h3>نجيل لاندسكيب (كثافات متعددة)</h3>
                
                <div class="calc-box">
                    <select id="grass-type" onchange="updateGrassPrice()">
                        <option value="180" data-img="images/grass-turkish.jpg">نجيل تركي فاخر - 40 ملم</option>
                        <option value="220" data-img="images/grass-mix.jpg">نجيل ميكس (شبه الطبيعي) - 50 ملم</option>
                        <option value="160" data-img="images/grass-stadium.jpg">نجيل أخضر زاهي (ملاعب)</option>
                        <option value="140" data-img="images/grass-eco.jpg">نجيل اقتصادي - 30 ملم</option>
                    </select>
                    <input type="number" id="grass-area" placeholder="أدخل المساحة بالمتر المربع" oninput="updateGrassPrice()">
                    <span class="total" id="grass-total">إجمالي: 0 ج.م</span>
                    <button class="btn-order" onclick="openCart('نجيل')">اطلب الآن ➜</button>
                </div>
            </div>
        </div>

        <div class="product-card" data-aos="fade-up" data-aos-delay="100">
            <div class="img-container">
                <img src="images/white-pebbles.jpg" alt="White Pebbles">
            </div>
            <div class="info">
                <span class="category">أحجار ديكور</span>
                <h3>زلط أبيض كريستال ناصع</h3>
                <div class="calc-box">
                    <input type="number" id="pebble-area" placeholder="أدخل عدد الأمتار / الشكاير" oninput="updatePebblePrice()">
                    <span class="total" id="pebble-total">إجمالي: 0 ج.م</span>
                    <button class="btn-order" onclick="openCart('زلط')">اطلب الآن ➜</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="side-cart" id="sideCart">
    <span class="close-cart" onclick="closeCart()">✕</span>
    <h2>تأكيد الطلب</h2>
    
    <div class="cart-field">
        <label>الاسم بالكامل</label>
        <input type="text" id="cust-name" placeholder="اسم الحوت">
    </div>
    
    <div class="cart-field">
        <label>المنطقة (التجمع/زايد/...)</label>
        <input type="text" id="cust-location" placeholder="مثلاً: التجمع الخامس">
    </div>

    <div class="cart-field">
        <label>حالة الموقع والتركيب</label>
        <select id="order-status">
            <option value="فوري">تنفيذ فوري (المساحة دقيقة والأرض جاهزة)</option>
            <option value="معاينة">طلب معاينة فنية (لرفع المقاسات بدقة)</option>
        </select>
    </div>

    <div class="cart-field">
        <label>موعد الشحن / المعاينة المطلوب</label>
        <input type="date" id="order-date">
    </div>

    <div id="cart-summary" style="margin: 20px 0; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px;">
        </div>

    <button class="btn-order" style="background:#25D366;" onclick="sendToWhatsApp()">
        <i class="fab fa-whatsapp"></i> إرسال الطلب للمدير
    </button>
</div>

<div class="cart-trigger" onclick="openCart()">
    <i class="fas fa-shopping-bag"></i>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    let currentOrder = { type: '', area: 0, price: 0, title: '' };

    function updateGrassPrice() {
        const select = document.getElementById('grass-type');
        const pricePerMeter = select.value;
        const area = document.getElementById('grass-area').value || 0;
        const total = pricePerMeter * area;
        document.getElementById('grass-total').innerText = `إجمالي: ${total.toLocaleString()} ج.م`;
        
        // تحديث الصورة بناء على النوع
        const imgPath = select.options[select.selectedIndex].getAttribute('data-img');
        if(imgPath) document.getElementById('grass-img').src = imgPath;

        currentOrder = { type: 'نجيل', area: area, price: total, title: select.options[select.selectedIndex].text };
    }

    function updatePebblePrice() {
        const area = document.getElementById('pebble-area').value || 0;
        const total = area * 150; // سعر افتراضي
        document.getElementById('pebble-total').innerText = `إجمالي: ${total.toLocaleString()} ج.م`;
        currentOrder = { type: 'زلط', area: area, price: total, title: 'زلط أبيض كريستال' };
    }

    function openCart(type) {
        document.getElementById('sideCart').classList.add('active');
        const summary = document.getElementById('cart-summary');
        summary.innerHTML = `
            <strong>الطلب:</strong> ${currentOrder.title}<br>
            <strong>المساحة/الكمية:</strong> ${currentOrder.area} متر<br>
            <strong>الإجمالي:</strong> ${currentOrder.price.toLocaleString()} ج.م
        `;
    }

    function closeCart() {
        document.getElementById('sideCart').classList.remove('active');
    }

    function sendToWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const loc = document.getElementById('cust-location').value;
        const status = document.getElementById('order-status').value;
        const date = document.getElementById('order-date').value;

        if(!name || !loc) { alert('برجاء ملء بيانات الاسم والمنطقة'); return; }

        const emoji = status === 'فوري' ? '🏎️' : '🔍';
        const message = `طلب جديد من Habib Store ${emoji}
--------------------------
العميل: ${name}
المنطقة: ${loc}
النوع: ${currentOrder.title}
المساحة: ${currentOrder.area} متر مربع
الإجمالي: ${currentOrder.price.toLocaleString()} ج.م
الحالة: ${status === 'فوري' ? 'جاهز للتنفيذ الفوري' : 'مطلوب معاينة فنية'}
الموعد المطلوب: ${date}
--------------------------
تم الطلب عبر المتجر الذكي`;

        const waUrl = `https://wa.me/20123456789?text=${encodeURIComponent(message)}`;
        window.open(waUrl, '_blank');
    }
</script>

</body>
</html>
