<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الطلب | HABIB STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --gray: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #fff; color: var(--black); line-height: 1.6; overflow-x: hidden; }
        
        header { padding: 30px 5%; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 30px; background: #fff; }
        .logo { font-family: 'Amiri', serif; font-size: 28px; color: var(--black); text-decoration: none; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; padding: 0 5% 50px; }
        h2 { font-family: 'Amiri', serif; font-size: 24px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--black); }

        /* قائمة المنتجات */
        .cart-section { background: #fff; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #f2f2f2; }
        .item-info h4 { font-size: 16px; font-weight: 600; color: var(--black); margin-bottom: 5px; }
        .item-info p { font-size: 13px; color: #888; }
        .item-price { font-weight: 700; color: var(--gold); font-size: 15px; }
        .remove-btn { background: none; border: none; color: #ddd; cursor: pointer; transition: 0.3s; padding: 5px 15px; font-size: 18px; }
        .remove-btn:hover { color: #ff4d4d; }

        /* فورم تأكيد الطلب */
        .checkout-form { background: var(--gray); padding: 35px; position: sticky; top: 100px; border: 1px solid #eee; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ccc; background: transparent; 
            font-family: 'Cairo'; font-size: 15px; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-bottom-color: var(--gold); }

        /* ملخص الحساب */
        .summary-box { margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #666; }
        .grand-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 22px; color: var(--black); margin-top: 15px; border-top: 2px solid var(--black); padding-top: 15px; }

        .btn-confirm { 
            background: var(--black); color: #fff; border: none; width: 100%; padding: 20px; 
            margin-top: 30px; cursor: pointer; font-size: 15px; font-weight: 700; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            letter-spacing: 1px;
        }
        .btn-confirm:hover { background: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* السلة الفاضية */
        #empty-cart { text-align: center; padding: 120px 5%; }
        #empty-cart i { font-size: 50px; color: #eee; margin-bottom: 25px; display: block; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px; border: 1px solid var(--gold); padding: 10px 25px; transition: 0.3s; }
        .back-btn:hover { background: var(--gold); color: #fff; }

        @media (max-width: 850px) { 
            .container { grid-template-columns: 1fr; gap: 30px; } 
            .checkout-form { position: static; } 
        }
    </style>
</head>
<body>

<header><a href="index.html" class="logo">HABIB STORE</a></header>

<div class="container" id="cart-content">
    <div class="cart-section">
        <h2>أصناف المختارة</h2>
        <div id="items-list">
            </div>
    </div>

    <div class="checkout-form">
        <h2>تأكيد الحجز</h2>
        <div class="form-group">
            <label>الاسم بالكامل</label>
            <input type="text" id="name" placeholder="مثال: محمود المصري">
        </div>
        <div class="form-group">
            <label>موقع التنفيذ / العنوان</label>
            <input type="text" id="location" placeholder="التجمع الخامس، الشيخ زايد...">
        </div>
        <div class="form-group">
            <label>نوع الخدمة المطلوبة</label>
            <select id="service">
                <option value="توريد وتركيب فوري">توريد وتركيب فوري 🏎️</option>
                <option value="معاينة ورفع مقاسات">طلب فني للمعاينة 🔍</option>
                <option value="توريد خامات فقط">توريد خامات فقط 🚛</option>
            </select>
        </div>

        <div class="summary-box">
            <div class="summary-row"><span>إجمالي عدد العناصر:</span> <span id="count">0</span></div>
            <div class="grand-total"><span>الإجمالي النهائي:</span> <span id="total">0</span> ج.م</div>
        </div>

        <button class="btn-confirm" onclick="sendOrder()">إرسال الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
        <p style="font-size: 10px; color: #aaa; text-align: center; margin-top: 15px;">سيتم تحويلك لمحادثة الواتساب مباشرة لتأكيد الطلب.</p>
    </div>
</div>

<div id="empty-cart" style="display:none;">
    <i class="fas fa-shopping-bag"></i>
    <h3>السلة خالية يا حوت</h3>
    <p style="color: #888;">لم تقم بإضافة أي منتجات بعد.</p>
    <a href="index.html" class="back-btn">العودة للمتجر واكتشاف العروض ➜</a>
</div>

<script>
    // وظيفة تحميل السلة وعرضها
    function loadCart() {
        const cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        const listDiv = document.getElementById('items-list');
        const totalSpan = document.getElementById('total');
        const countSpan = document.getElementById('count');
        const cartContent = document.getElementById('cart-content');
        const emptyDiv = document.getElementById('empty-cart');
        
        if (cart.length === 0) {
            cartContent.style.display = 'none';
            emptyDiv.style.display = 'block';
            return;
        }

        cartContent.style.display = 'grid';
        emptyDiv.style.display = 'none';
        
        listDiv.innerHTML = '';
        let totalAmount = 0;

        cart.forEach((item, index) => {
            const price = parseFloat(item.price || 0);
            totalAmount += price;
            listDiv.innerHTML += `
                <div class="item-row">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>الكمية: ${item.area} وحدة</p>
                    </div>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span class="item-price">${price.toLocaleString()} ج.م</span>
                        <button class="remove-btn" onclick="deleteItem(${index})" title="حذف">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>`;
        });

        totalSpan.innerText = totalAmount.toLocaleString();
        countSpan.innerText = cart.length;
    }

    // حذف عنصر من السلة
    function deleteItem(index) {
        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('habibCart', JSON.stringify(cart));
        loadCart();
    }

    // إرسال الطلب للواتساب
    function sendOrder() {
        const name = document.getElementById('name').value.trim();
        const loc = document.getElementById('location').value.trim();
        const service = document.getElementById('service').value;
        const cart = JSON.parse(localStorage.getItem('habibCart')) || [];

        if (!name || !loc) { 
            alert('يا حوت، البيانات ناقصة! الاسم والموقع ضروري عشان نخدمك صح.'); 
            return; 
        }

        // بناء الرسالة بشكل احترافي
        let message = `*طلب جديد من متجر HABIB STORE* 🦈\n`;
        message += `--------------------------------\n`;
        message += `👤 *العميل:* ${name}\n`;
        message += `📍 *الموقع:* ${loc}\n`;
        message += `🛠️ *الخدمة:* ${service}\n`;
        message += `--------------------------------\n`;
        message += `📦 *المنتجات المطلوبة:*\n\n`;
        
        cart.forEach((item, i) => {
            message += `${i+1}. *${item.name}*\n`;
            message += `   - الكمية: ${item.area}\n`;
            message += `   - السعر: ${item.price.toLocaleString()} ج.م\n\n`;
        });

        message += `--------------------------------\n`;
        message += `💰 *الإجمالي النهائي: ${document.getElementById('total').innerText} ج.م*\n`;
        message += `--------------------------------\n`;
        message += `_تم إرسال الطلب من نظام Shark Selection_`;

        // فتح واتساب (استخدمت الرقم اللي في بياناتك)
        const whatsappNumber = "201016961497";
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }

    // التحميل عند فتح الصفحة
    window.onload = loadCart;
</script>
</body>
</html>
