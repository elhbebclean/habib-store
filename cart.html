
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الطلب | HABIB STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #AF944F; --black: #0a0a0a; --gray: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #fff; color: var(--black); line-height: 1.6; }
        
        header { padding: 30px 5%; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 30px; }
        .logo { font-family: 'Amiri', serif; font-size: 28px; color: var(--black); text-decoration: none; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; padding: 0 5%; }
        h2 { font-family: 'Amiri', serif; font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
        .item-info h4 { font-size: 15px; font-weight: 600; color: var(--black); }
        .item-info p { font-size: 12px; color: #888; }
        .item-price { font-weight: 600; color: var(--gold); font-size: 14px; }
        .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; transition: 0.3s; padding: 5px 10px; }
        .remove-btn:hover { color: #ff4d4d; }

        .checkout-form { background: var(--gray); padding: 30px; position: sticky; top: 100px; border: 1px solid #eee; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border: none; border-bottom: 1px solid #ccc; background: transparent; 
            font-family: 'Cairo'; font-size: 14px; outline: none;
        }
        .form-group input:focus { border-bottom-color: var(--gold); }

        .summary-box { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .grand-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; color: var(--black); margin-top: 10px; }

        .btn-confirm { 
            background: var(--black); color: #fff; border: none; width: 100%; padding: 18px; 
            margin-top: 25px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-confirm:hover { background: var(--gold); }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .checkout-form { position: static; } }
    </style>
</head>
<body>

<header><a href="index.html" class="logo">HABIB STORE</a></header>

<div class="container" id="cart-content">
    <div class="cart-section">
        <h2>أصناف المختارة</h2>
        <div id="items-list">
            </div>
    </div>

    <div class="checkout-form">
        <h2>تأكيد الحجز</h2>
        <div class="form-group">
            <label>الاسم</label>
            <input type="text" id="name" placeholder="اكتب اسمك هنا">
        </div>
        <div class="form-group">
            <label>موقع التنفيذ</label>
            <input type="text" id="location" placeholder="التجمع، زايد، الساحل...">
        </div>
        <div class="form-group">
            <label>نوع الخدمة</label>
            <select id="service">
                <option value="توريد وتركيب فوري">توريد وتركيب فوري 🏎️</option>
                <option value="معاينة ورفع مقاسات">طلب فني للمعاينة 🔍</option>
                <option value="توريد خامات فقط">توريد خامات فقط 🚛</option>
            </select>
        </div>

        <div class="summary-box">
            <div class="summary-row"><span>عدد العناصر:</span> <span id="count">0</span></div>
            <div class="grand-total"><span>الإجمالي:</span> <span id="total">0</span> ج.م</div>
        </div>

        <button class="btn-confirm" onclick="sendOrder()">إرسال الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
    </div>
</div>

<div id="empty-cart" style="display:none; text-align:center; padding:100px 5%;">
    <i class="fas fa-shopping-bag" style="font-size:40px; color:#eee; margin-bottom:20px;"></i>
    <h3>السلة خالية يا حوت</h3>
    <a href="index.html" style="color:var(--gold); text-decoration:none; display:block; margin-top:15px;">العودة للمتجر ➜</a>
</div>

<script>
    function loadCart() {
        const cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        const listDiv = document.getElementById('items-list');
        const totalSpan = document.getElementById('total');
        const countSpan = document.getElementById('count');
        
        if (cart.length === 0) {
            document.getElementById('cart-content').style.display = 'none';
            document.getElementById('empty-cart').style.display = 'block';
            return;
        }

        document.getElementById('cart-content').style.display = 'grid';
        document.getElementById('empty-cart').style.display = 'none';
        
        listDiv.innerHTML = '';
        let totalAmount = 0;

        cart.forEach((item, index) => {
            const price = parseFloat(item.price || 0);
            totalAmount += price;
            listDiv.innerHTML += `
                <div class="item-row">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>الكمية: ${item.area} (متر/قطعة)</p>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="item-price">${price.toLocaleString()} ج.م</span>
                        <button class="remove-btn" onclick="deleteItem(${index})"><i class="fas fa-times"></i></button>
                    </div>
                </div>`;
        });

        totalSpan.innerText = totalAmount.toLocaleString();
        countSpan.innerText = cart.length;
    }

    function deleteItem(index) {
        let cart = JSON.parse(localStorage.getItem('habibCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('habibCart', JSON.stringify(cart));
        loadCart();
    }

    function sendOrder() {
        const name = document.getElementById('name').value;
        const loc = document.getElementById('location').value;
        const service = document.getElementById('service').value;
        const cart = JSON.parse(localStorage.getItem('habibCart')) || [];

        if (!name || !loc) { 
            alert('يا حوت، كمل بياناتك الأول عشان نبعت الطلب صح!'); 
            return; 
        }

        let message = `*طلب جديد من Habib Store* 🦈\n`;
        message += `--------------------------\n`;
        message += `*العميل:* ${name}\n`;
        message += `*الموقع:* ${loc}\n`;
        message += `*الخدمة:* ${service}\n\n`;
        message += `*المنتجات:*\n`;
        
        cart.forEach((item, i) => {
            message += `${i+1}. ${item.name} (${item.area} متر/قطعة)\n`;
        });

        message += `\n*الإجمالي النهائي:* ${document.getElementById('total').innerText} ج.م\n`;
        message += `--------------------------\n`;
        message += `_تم الإرسال من متجر حبيب للاندسكيب_`;

        window.open(`https://wa.me/201016961497?text=${encodeURIComponent(message)}`, '_blank');
    }

    window.onload = loadCart;
</script>
</body>
</html>
